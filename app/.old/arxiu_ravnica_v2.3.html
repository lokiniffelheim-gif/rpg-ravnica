let db=null;
async function initFirebase(cfg){
  if(!window.firebase){
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js");
  }
  try{
    const app=window.firebase.apps.length?window.firebase.app():window.firebase.initializeApp(cfg);
    db=window.firebase.firestore(app);
    await db.collection("ravnica").doc("handouts").get();
    return true;
  }catch(e){db=null;return false;}
}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector('script[src="'+src+'"]')){res();return;}const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function fbSave(key,data){if(!db)return false;try{await db.collection("ravnica").doc(key).set({data:JSON.stringify(data)});return true;}catch(e){return false;}}
async function fbLoad(key){if(!db)return null;try{const r=await db.collection("ravnica").doc(key).get();return r.exists?JSON.parse(r.data().data):null;}catch(e){return null;}}

function visToArr(v){if(!v||v==="Tots")return["Tots"];return v.split(",").map(s=>s.trim()).filter(Boolean);}
function arrToVis(arr){if(!arr||arr.length===0)return"Tots";if(arr.includes("Tots"))return"Tots";return arr.join(", ");}
function mc(item,tab){if(tab==="aventino")return GC[item.gremi]||"#8a7a5a";return tab==="handouts"?PC[item.propietari]||"#8a7a5a":item.tags&&item.tags.length?GC[item.tags[0]]||"#8a7a5a":"#8a7a5a";}
function initials(n){return(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");}

function Toggle({value,onChange,small}){
  const col=value?"#5a9a3a":"#3a3020";
  if(small)return(
    <div onClick={e=>{e.stopPropagation();onChange(!value);}} style={{width:28,height:16,borderRadius:8,background:value?"#5a9a3a44":"#3a3020",border:"1px solid "+(value?"#5a9a3a66":"#3a3020"),position:"relative",cursor:"pointer",flexShrink:0,transition:"all .2s"}}>
      <div style={{position:"absolute",top:2,left:value?12:2,width:10,height:10,borderRadius:"50%",background:value?"#5a9a3a":"#5a5040",transition:"left .2s"}}/>
    </div>
  );
  return(
    <div style={{display:"inline-flex",alignItems:"center",gap:7,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onChange(!value);}}>
      <div style={{width:36,height:20,borderRadius:10,background:col,position:"relative",transition:"background .2s",flexShrink:0}}>
        <div style={{position:"absolute",top:3,left:value?19:3,width:14,height:14,borderRadius:"50%",background:"#0f0e0c",transition:"left .2s"}}/>
      </div>
      <span style={{fontSize:11,color:value?"#5a9a3a":"#5a5040",fontFamily:"'Cinzel',serif",letterSpacing:".05em"}}>{value?"ACTIU":"INACTIU"}</span>
    </div>
  );
}

function VisibleSelect({value,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const sel=visToArr(value);const isTots=sel.includes("Tots");
  useEffect(()=>{if(!open)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[open]);
  const toggle=pj=>{if(pj==="Tots"){onChange("Tots");return;}let next=isTots?[]:[...sel];if(next.includes(pj))next=next.filter(x=>x!==pj);else next.push(pj);if(next.length===0)next=["Tots"];onChange(arrToVis(next));};
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",flexWrap:"wrap",gap:4,padding:"4px 8px",cursor:"pointer",border:"1px solid "+(open?GOLD+"66":BORDER),borderRadius:3,background:"#0f0e0c",minHeight:28,alignItems:"center"}}>
        {isTots?<span style={{fontSize:12,color:"#5a9a3a",fontFamily:"'Cinzel',serif",letterSpacing:".04em"}}>✦ Tots</span>:sel.map(p=><span key={p} className="rv-pill" style={{background:(PC[p]||"#888")+"18",border:"1px solid "+(PC[p]||"#888")+"44",color:PC[p]||"#888"}}>{p}</span>)}
        <span style={{marginLeft:"auto",color:GOLD,opacity:.4,fontSize:10}}>▾</span>
      </div>
      {open&&<div className="rv-dropdown">
        <label className="rv-check-row"><input type="checkbox" checked={isTots} onChange={()=>toggle("Tots")}/><span style={{color:"#5a9a3a",fontFamily:"'Cinzel',serif",fontSize:11}}>✦ Tots</span></label>
        {PJS.map(p=><label key={p} className="rv-check-row"><input type="checkbox" checked={!isTots&&sel.includes(p)} onChange={()=>toggle(p)} disabled={isTots}/><span style={{color:isTots?"#4a4030":PC[p]||"#888",fontFamily:"'Cinzel',serif",fontSize:11}}>{p}</span></label>)}
      </div>}
    </div>
  );
}

function Field({value,onChange,multi,accent,ph}){
  ph=ph||"Editar...";
  const [ed,setEd]=useState(false);
  const [draft,setDraft]=useState(value);
  const ref=useRef(null);
  useEffect(()=>setDraft(value),[value]);
  useEffect(()=>{if(!ed)return;const h=e=>{if(ref.current&&!ref.current.contains(e.target)){onChange(draft);setEd(false);}};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[ed,draft,onChange]);
  const commit=()=>{onChange(draft);setEd(false);};
  const s={width:"100%",padding:"5px 8px",borderRadius:3,border:"1px solid "+(GOLD+"55"),background:"#0f0e0c",color:"#e0d4b8",WebkitTextFillColor:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",fontSize:15,outline:"none",lineHeight:1.75,opacity:1};
  if(!ed)return(
    <div className="rv-editable" onClick={()=>setEd(true)} style={{position:"relative",minHeight:24}}>
      <span style={{position:"absolute",top:4,right:6,fontSize:10,color:GOLD,opacity:.4,pointerEvents:"none"}}>✎</span>
      {value?<p style={{margin:0,fontSize:15,lineHeight:1.75,color:"#e0d4b8",whiteSpace:"pre-line",paddingRight:14}}>{value}</p>:<p style={{margin:0,fontSize:14,color:"#5a5040",fontStyle:"italic"}}>{ph}</p>}
    </div>
  );
  return(
    <div ref={ref}>
      {multi?<textarea autoFocus value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Escape")commit();}} style={{...s,minHeight:80,resize:"vertical",display:"block"}}/>:<input autoFocus type="text" value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")commit();}} style={s}/>}
    </div>
  );
}

function GuildTagSel({value,opts,onChange,onRemove,cm}){
  const [ed,setEd]=useState(false);const col=(cm&&cm[value])||"#8a7a5a";
  if(!ed)return(<span style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:11,padding:"2px 4px 2px 8px",borderRadius:10,background:col+"18",border:"1px solid "+col+"44",color:col,fontFamily:"'Cinzel',serif",letterSpacing:".04em"}}><span onClick={()=>setEd(true)} style={{cursor:"pointer"}}>{value}</span><button onClick={e=>{e.stopPropagation();onRemove();}} className="rv-pill-x" style={{color:col}}>×</button></span>);
  return(<select autoFocus value={value} onChange={e=>{onChange(e.target.value);setEd(false);}} onBlur={()=>setEd(false)} style={{fontSize:12,padding:"3px 8px",borderRadius:3,border:"1px solid "+GOLD+"55",background:"#0f0e0c",color:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",cursor:"pointer",WebkitTextFillColor:"#e0d4b8"}}>{opts.map(o=><option key={o} value={o} style={{background:"#0f0e0c",color:"#e0d4b8"}}>{o}</option>)}</select>);
}

function Sel({value,opts,onChange,cm}){
  const [ed,setEd]=useState(false);const col=(cm&&cm[value])||"#8a7a5a";
  if(!ed)return(<span className="rv-tag" onClick={()=>setEd(true)} style={{background:col+"18",border:"1px solid "+col+"44",color:col}}>{value} ✎</span>);
  return(<select autoFocus value={value} onChange={e=>{onChange(e.target.value);setEd(false);}} onBlur={()=>setEd(false)} style={{fontSize:14,padding:"3px 8px",borderRadius:3,border:"1px solid "+GOLD+"55",background:"#0f0e0c",color:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",cursor:"pointer",WebkitTextFillColor:"#e0d4b8"}}>{opts.map(o=><option key={o} value={o} style={{background:"#0f0e0c",color:"#e0d4b8"}}>{o}</option>)}</select>);
}

function Rule({color}){const c=color||GOLD;return(<div style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0"}}><div style={{flex:1,height:"1px",background:"linear-gradient(to right,transparent,"+c+"40)"}}/><span style={{fontSize:10,color:c,opacity:.5}}>✦</span><div style={{flex:1,height:"1px",background:"linear-gradient(to left,transparent,"+c+"40)"}}/></div>);}

function SetupScreen({onConnect}){
  const [cfg,setCfg]=useState(()=>{try{return JSON.parse(localStorage.getItem("rv_fbcfg")||"{}");}catch(e){return{};}});
  const [loading,setLoading]=useState(false);const [error,setError]=useState("");
  const fields=[{k:"apiKey",label:"API Key"},{k:"authDomain",label:"Auth Domain"},{k:"projectId",label:"Project ID"},{k:"storageBucket",label:"Storage Bucket"},{k:"messagingSenderId",label:"Messaging Sender ID"},{k:"appId",label:"App ID"}];
  const handlePaste=e=>{const t=e.clipboardData.getData("text");const m=t.match(/apiKey:\s*["'](.*?)["'].*?authDomain:\s*["'](.*?)["'].*?projectId:\s*["'](.*?)["'].*?storageBucket:\s*["'](.*?)["'].*?messagingSenderId:\s*["'](.*?)["'].*?appId:\s*["'](.*?)["']/s);if(m){setCfg({apiKey:m[1],authDomain:m[2],projectId:m[3],storageBucket:m[4],messagingSenderId:m[5],appId:m[6]});e.preventDefault();}};
  const connect=async()=>{if(!cfg.apiKey||!cfg.projectId){setError("Cal omplir API Key i Project ID");return;}setLoading(true);setError("");const ok=await initFirebase(cfg);if(ok){localStorage.setItem("rv_fbcfg",JSON.stringify(cfg));onConnect();}else setError("Error de connexió. Comprova les credencials i que Firestore estigui activat.");setLoading(false);};
  return(
    <div style={{height:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:480,width:"100%"}}>
        <div style={{textAlign:"center",marginBottom:24}}><div style={{fontSize:28,marginBottom:6}}>⚜</div><div style={{fontFamily:"'Cinzel',serif",fontSize:18,color:"#f0e4b0",letterSpacing:".06em",marginBottom:4}}>Arxiu de Ravnica v2.3</div><div style={{fontSize:13,color:"#8a7a60",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>Configura Firebase per sincronitzar entre dispositius</div></div>
        <div style={{background:BG2,border:"1px solid "+BORDER,borderRadius:4,padding:"12px 14px",marginBottom:14,fontSize:13,color:"#9a8a70",lineHeight:1.7,fontFamily:"'Crimson Text',serif"}}><strong style={{color:"#c8b880",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:".06em"}}>COM CONFIGURAR (5 min)</strong><br/>1. Ves a <a href="https://console.firebase.google.com" target="_blank" style={{color:GOLD}}>console.firebase.google.com</a><br/>2. Crea un projecte → activa <strong style={{color:"#c8b880"}}>Firestore Database</strong> en mode test<br/>3. Configuració → Afegeix app web → copia el config<br/>4. Enganxa'l al camp de sota</div>
        <div style={{marginBottom:10}}><div style={{fontSize:10,color:GOLD,fontFamily:"'Cinzel',serif",letterSpacing:".08em",marginBottom:5}}>ENGANXA EL FIREBASECONFIG:</div><textarea className="setup-input" style={{minHeight:55,resize:"vertical"}} placeholder="Enganxa aquí el codi firebaseConfig = { apiKey: ..., }" onPaste={handlePaste} readOnly/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,marginBottom:12}}>{fields.map(({k,label})=><div key={k}><div style={{fontSize:9,color:"#6a5a40",fontFamily:"'Cinzel',serif",letterSpacing:".06em",marginBottom:2}}>{label.toUpperCase()}</div><input className="setup-input" style={{marginBottom:0}} value={cfg[k]||""} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} placeholder={label}/></div>)}</div>
        {error&&<div style={{color:"#c43030",fontSize:12,marginBottom:10,padding:"6px 10px",background:"#c4303015",borderRadius:3,border:"1px solid #c4303033"}}>{error}</div>}
        <div style={{display:"flex",gap:8}}>
          <button className="rv-btn-gold" onClick={connect} disabled={loading} style={{flex:1,padding:"10px",fontSize:12,opacity:loading?.7:1}}>{loading?"CONNECTANT...":"⚡ CONNECTAR AMB FIREBASE"}</button>
          <button onClick={()=>{db=null;onConnect();}} style={{padding:"10px 14px",fontSize:11,background:"transparent",color:"#6a5a40",border:"1px solid "+BORDER,borderRadius:3,cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".05em",whiteSpace:"nowrap"}}>Usar local</button>
        </div>
        <div style={{textAlign:"center",marginTop:8,fontSize:11,color:"#4a3a28",fontFamily:"'Crimson Text',serif"}}>"Usar local" guarda les dades només en aquest navegador</div>
      </div>
    </div>
  );
}

function AventinPanel({edificis,onUpdate,sel,onSelect,isMob,showD,setShowD}){
  const [q,setQ]=useState("");
  const [fg,setFg]=useState("all");
  const [fa,setFa]=useState("all");
  const gremis=useMemo(()=>[...new Set(edificis.map(e=>e.gremi))].filter(Boolean).sort(),[edificis]);
  const filtered=useMemo(()=>{const lq=q.toLowerCase();return edificis.filter(e=>{const ms=!lq||e.nom.toLowerCase().includes(lq)||(e.personajes||"").toLowerCase().includes(lq)||(e.reglas||"").toLowerCase().includes(lq)||(e.conflicto||"").toLowerCase().includes(lq);const mg=fg==="all"||e.gremi===fg;const ma=fa==="all"||(fa==="actiu"&&e.activo)||(fa==="inactiu"&&!e.activo);return ms&&mg&&ma;});},[edificis,q,fg,fa]);
  const item=sel!==null&&sel<filtered.length?filtered[sel]:null;
  const origI=item?edificis.findIndex(e=>e===item):-1;
  const ac=item?GC[item.gremi]||GOLD:GOLD;
  const upd=(f,v)=>{if(f==="__nou__"){onUpdate(edificis.length,"__nou__",v);return;}if(origI<0)return;onUpdate(origI,f,v);};

  const Detail=item?(
    <div className="rv-detail" style={{flex:1,overflowY:"auto",padding:"16px 18px",position:"relative",...(isMob?{position:"absolute",top:0,left:0,right:0,bottom:0,background:BG,zIndex:10}:{})}}>
      {isMob&&<button onClick={()=>setShowD(false)} style={{marginBottom:14,background:"none",border:"none",cursor:"pointer",color:GOLD,fontSize:14,padding:0,fontFamily:"'Cinzel',serif",letterSpacing:".06em"}}>← TORNAR</button>}
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
        <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,background:"radial-gradient(circle at 30% 30%,"+ac+"28,"+ac+"0a)",border:"1px solid "+ac+"55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:ac}}>{GS[item.gremi]||"🏛"}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{marginBottom:5}}><Field value={item.nom} onChange={v=>upd("nom",v)} accent={ac}/></div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",paddingLeft:8}}>
            <Sel value={item.gremi} opts={AG} onChange={v=>upd("gremi",v)} cm={GC}/>
            <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,fontFamily:"'Cinzel',serif",background:(NVC[item.nivel]||"#888")+"20",border:"1px solid "+(NVC[item.nivel]||"#888")+"44",color:NVC[item.nivel]||"#888"}}>{item.nivel}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
          <Toggle value={item.activo} onChange={v=>upd("activo",v)}/>
          {!isMob&&<button onClick={()=>{onSelect(null);setShowD(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#9a8a70",fontSize:20,padding:"0 2px",lineHeight:1}}>×</button>}
        </div>
      </div>
      <Rule color={ac}/>
      <div style={{display:"grid",gridTemplateColumns:isMob?"1fr":"1fr 1fr",gap:"0 16px"}}>
        <div style={{marginBottom:12}}><div style={{fontSize:10,color:ac,fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:3,paddingLeft:8,opacity:.8}}>👤 PERSONAJES</div><Field value={item.personajes} onChange={v=>upd("personajes",v)} accent={ac} ph="Cap personatge assignat"/></div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,color:"#c43030",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:3,paddingLeft:8,opacity:.8}}>⚔ CONFLICTE</div><Field value={item.conflicto} onChange={v=>upd("conflicto",v)} accent="#c43030" ph="Cap conflicte actiu"/></div>
      </div>
      <div style={{marginBottom:12}}><div style={{fontSize:10,color:"#5b9fd4",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:3,paddingLeft:8,opacity:.8}}>📜 REGLES</div><Field value={item.reglas} onChange={v=>upd("reglas",v)} accent="#5b9fd4" multi={true} ph="Cap regla especial"/></div>
      <Rule/>
      <div><div style={{fontSize:10,color:"#9a8a70",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:3,paddingLeft:8}}>💡 IDEES / NOTES DM</div><Field value={item.ideas} onChange={v=>upd("ideas",v)} multi={true} accent={GOLD} ph="Notes i idees..."/></div>
    </div>
  ):null;

  return(
    <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative",background:BG}}>
      <div style={{width:isMob?"100%":item?"38%":"100%",display:isMob&&showD&&item?"none":"flex",flexDirection:"column",borderRight:!isMob&&item?"1px solid "+BORDER:"none",transition:"width .2s"}}>
        <div style={{padding:"8px 10px",borderBottom:"1px solid "+BORDER,flexShrink:0,background:BG2}}>
          <div style={{position:"relative",marginBottom:7}}>
            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:GOLD,opacity:.5,pointerEvents:"none"}}>⚜</span>
            <input type="text" placeholder="Cerca edificis..." value={q} onChange={e=>{setQ(e.target.value);onSelect(null);}} style={{width:"100%",padding:"7px 10px 7px 28px",borderRadius:3,border:"1px solid "+BORDER,background:"#0f0e0c",color:"#e0d4b8",WebkitTextFillColor:"#e0d4b8",fontFamily:"'Crimson Text',serif",fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
            <button className="rv-filter" onClick={()=>setFg("all")} style={{background:fg==="all"?GOLD+"22":"transparent",border:"1px solid "+(fg==="all"?GOLD+"55":BORDER),color:fg==="all"?GOLD:"#7a6a50"}}>TOTS</button>
            {gremis.map(g=><button key={g} className="rv-filter" onClick={()=>setFg(g===fg?"all":g)} style={{background:fg===g?GC[g]+"1a":"transparent",border:"1px solid "+(fg===g?GC[g]+"55":GC[g]+"22"),color:fg===g?GC[g]:"#7a6a50"}}>{GS[g]} {g}</button>)}
          </div>
          <div style={{display:"flex",gap:3,alignItems:"center"}}>
            {[["all","Tots"],["actiu","Actius"],["inactiu","Inactius"]].map(([v,l])=><button key={v} className="rv-filter" onClick={()=>setFa(v)} style={{background:fa===v?GOLD+"22":"transparent",border:"1px solid "+(fa===v?GOLD+"55":BORDER),color:fa===v?GOLD:"#7a6a50"}}>{l}</button>)}
            <span style={{marginLeft:"auto",fontSize:10,color:"#5a5040",fontFamily:"'Cinzel',serif"}}>{filtered.filter(e=>e.activo).length}/{filtered.length} actius</span>
          </div>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {filtered.length===0&&<div style={{padding:30,color:"#8a7a60",fontSize:15,textAlign:"center",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>Cap edifici trobat...</div>}
          {filtered.map((e,i)=>{
            const c=GC[e.gremi]||"#8a7a5a",isSel=!isMob&&sel===i,nc=NVC[e.nivel]||"#8a7a5a";
            return(
              <div key={i} onClick={()=>{onSelect(i===sel&&!isMob?null:i);setShowD(true);}} className="rv-row" style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid "+BORDER,background:isSel?BG3:e.activo?"transparent":"#0a0908",borderLeft:isSel?"2px solid "+c:"2px solid transparent",display:"flex",alignItems:"center",gap:10,opacity:e.activo?1:.45,transition:"background .1s"}}>
                <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:c+"14",border:"1px solid "+c+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:c}}>{GS[e.gremi]||"🏛"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                    <span style={{fontSize:13,color:isSel?"#f0e4b0":"#d4c8a8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Cinzel',serif",letterSpacing:".03em",fontWeight:isSel?600:400,flex:1,minWidth:0}}>{e.nom}</span>
                    <span style={{fontSize:9,padding:"1px 5px",borderRadius:8,background:nc+"18",color:nc,fontFamily:"'Cinzel',serif",flexShrink:0}}>{e.nivel}</span>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {e.personajes&&<span style={{fontSize:10,color:"#9a8a70",fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>👤 {e.personajes}</span>}
                    {e.conflicto&&<span style={{fontSize:10,color:"#c4303088",fontFamily:"'Cinzel',serif"}}>⚔ {e.conflicto}</span>}
                  </div>
                </div>
                <Toggle small={true} value={e.activo} onChange={v=>{const idx=edificis.findIndex(x=>x===e);onUpdate(idx,"activo",v);}}/>
              </div>
            );
          })}
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid "+BORDER,background:BG2,flexShrink:0}}>
          <button onClick={()=>{upd("__nou__",{nom:"Nou edifici",nivel:"Lv0",gremi:"Guildless",personajes:"",reglas:"",conflicto:"",ideas:"",activo:true});onSelect(filtered.length);setShowD(true);}} style={{width:"100%",padding:"6px",fontSize:11,border:"1px dashed "+GOLD+"35",borderRadius:3,background:"transparent",color:"#7a6a50",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".08em"}}>+ NOU EDIFICI</button>
        </div>
      </div>
      {item&&(isMob?showD?Detail:null:<div style={{flex:1,overflowY:"auto",position:"relative"}}>{Detail}</div>)}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("chars");
  const [q,setQ]=useState("");
  const [filt,setFilt]=useState("all");
  const [sel,setSel]=useState(null);
  const [showD,setShowD]=useState(false);
  const [hs,setHs]=useState(HANDOUTS);
  const [cs,setCs]=useState(CHARS);
  const [eds,setEds]=useState(EDIFICIS_DEFAULT);
  const [saved,setSaved]=useState("");
  const [mob,setMob]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{const chk=()=>setMob(window.innerWidth<580);chk();window.addEventListener("resize",chk);return()=>window.removeEventListener("resize",chk);},[]);

  useEffect(()=>{
    (async()=>{
      try{
        const lsLoad=(key,def)=>{const v=localStorage.getItem(key);return v?JSON.parse(v):def;};
        const fbOrLs=async(key,def)=>{if(db){const d=await fbLoad(key);if(d)return d;}return lsLoad(key,def);};
        setHs(await fbOrLs("handouts",HANDOUTS));
        setCs(await fbOrLs("chars",CHARS));
        setEds(await fbOrLs("edificis",EDIFICIS_DEFAULT));
      }catch(e){}
    })();
  },[]);

  const saveKey=useCallback((key,data)=>{
    setSaved("⏳");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      if(db)await fbSave(key,data);
      else localStorage.setItem(key,JSON.stringify(data));
      setSaved("✦ Desat");setTimeout(()=>setSaved(""),2500);
    },600);
  },[]);

  const updH=(i,f,v)=>{const h=hs.map((x,j)=>j===i?{...x,[f]:v}:x);setHs(h);saveKey("handouts",h);};
  const updC=(i,f,v)=>{const c=cs.map((x,j)=>j===i?{...x,[f]:v}:x);setCs(c);saveKey("chars",c);};
  const updE=(i,f,v)=>{let e;if(f==="__nou__"){e=[...eds,v];}else{e=eds.map((x,j)=>j===i?{...x,[f]:v}:x);}setEds(e);saveKey("edificis",e);};

  const newH=()=>{const h=[...hs,{nom:"Nou handout",propietari:"Compartit",visible:"Tots",contingut:"",notes_dm:""}];setHs(h);saveKey("handouts",h);setTab("handouts");setQ("");setFilt("all");setSel(h.length-1);setShowD(true);};
  const newC=()=>{const c=[...cs,{nom:"Nou personatge",bio:"",info:"",tags:["Guildless"],controlledby:"DM",visible:"Tots"}];setCs(c);saveKey("chars",c);setTab("chars");setQ("");setFilt("all");setSel(c.length-1);setShowD(true);};
  const del=()=>{if(!item)return;if(!window.confirm('Eliminar "'+item.nom+'"?'))return;if(tab==="handouts"){const h=hs.filter((_,i)=>i!==origI);setHs(h);saveKey("handouts",h);}else{const c=cs.filter((_,i)=>i!==origI);setCs(c);saveKey("chars",c);}setSel(null);setShowD(false);};

  const items=tab==="handouts"?hs:cs;
  const fltd=useMemo(()=>{const lq=q.toLowerCase();return items.filter(x=>{const ms=!lq||x.nom.toLowerCase().includes(lq)||(x.contingut||"").toLowerCase().includes(lq)||(x.bio||"").toLowerCase().includes(lq)||(x.info||"").toLowerCase().includes(lq);const mf=tab==="chars"?filt==="all"||(x.tags||[]).includes(filt):filt==="all"||x.propietari===filt;return ms&&mf;});},[items,q,filt,tab]);
  const getOI=fi=>tab==="handouts"?hs.findIndex(x=>x===fi):cs.findIndex(x=>x===fi);
  const item=sel!==null&&sel<fltd.length?fltd[sel]:null;
  const origI=item?getOI(item):-1;
  const ac=item?mc(item,tab):GOLD;
  const isPJ=item&&PJS.includes(item.nom);

  function chTab(t){setTab(t);setQ("");setFilt("all");setSel(null);setShowD(false);}
  function pick(i){setSel(i===sel&&!mob?null:i);setShowD(true);}

  const syncCol=saved==="⏳"?"#8a7a5a":saved?"#a07830":db?"#5a9a3a":"#5a5040";
  const syncLabel=saved||( db?"☁ Firebase":"⬡ local");

  const Detail=item?(
    <div className="rv-detail" style={{flex:1,overflowY:"auto",padding:"16px 18px",position:"relative",...(mob?{position:"absolute",top:0,left:0,right:0,bottom:0,background:BG,zIndex:10}:{})}}>
      {mob&&<button onClick={()=>setShowD(false)} style={{marginBottom:14,background:"none",border:"none",cursor:"pointer",color:GOLD,fontSize:14,padding:0,fontFamily:"'Cinzel',serif",letterSpacing:".06em"}}>← TORNAR</button>}
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
        <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,background:"radial-gradient(circle at 30% 30%,"+ac+"28,"+ac+"0a)",border:"1px solid "+ac+"55",display:"flex",alignItems:"center",justifyContent:"center",fontSize:tab==="handouts"?17:13,color:ac,fontFamily:"'Cinzel',serif"}}>{tab==="handouts"?"📜":initials(item.nom)}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{marginBottom:6}}><Field value={item.nom} onChange={v=>tab==="handouts"?updH(origI,"nom",v):updC(origI,"nom",v)} accent={ac}/></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",paddingLeft:8}}>
            {tab==="chars"?(<>{(item.tags||[]).map((t,ti)=><GuildTagSel key={ti} value={t} opts={AG} cm={GC} onChange={v=>{const nt=[...(item.tags||[])];nt[ti]=v;updC(origI,"tags",nt);}} onRemove={()=>{const nt=(item.tags||[]).filter((_,j)=>j!==ti);updC(origI,"tags",nt.length?nt:["Guildless"]);}}/>)}<button onClick={()=>updC(origI,"tags",[...(item.tags||[]),"Guildless"])} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:"1px dashed "+GOLD+"44",background:"transparent",color:GOLD,cursor:"pointer",fontFamily:"'Cinzel',serif",opacity:.6}}>+ gremi</button></>):(<Sel value={item.propietari} opts={[...PJS,"Compartit","Només DM"]} onChange={v=>updH(origI,"propietari",v)} cm={PC}/>)}
            {isPJ&&<span className="rv-tag" style={{background:ac+"18",border:"1px solid "+ac+"44",color:ac,cursor:"default"}}>PJ</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          <button onClick={del} style={{background:"none",border:"1px solid #c4303033",borderRadius:3,cursor:"pointer",color:"#c43030",fontSize:14,padding:"3px 7px"}}>🗑</button>
          {!mob&&<button onClick={()=>{setSel(null);setShowD(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#9a8a70",fontSize:20,padding:"0 2px",lineHeight:1}}>×</button>}
        </div>
      </div>
      {tab==="chars"&&(<>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingLeft:4,marginBottom:6}}><div style={{fontSize:13,padding:"3px 10px",borderRadius:12,background:BG2,border:"1px solid "+BORDER,display:"flex",gap:5,alignItems:"center"}}><span style={{opacity:.5}}>🎮</span><span style={{color:"#9a8a70",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:".06em"}}>CONTROL</span><span style={{color:"#e0d4b8",fontFamily:"'Crimson Text',serif"}}>{item.controlledby}</span></div></div>
        <div style={{paddingLeft:4,marginBottom:6}}><div style={{fontSize:10,color:"#9a8a70",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:5}}>CONEIX A:</div><VisibleSelect value={item.visible||"Tots"} onChange={v=>updC(origI,"visible",v)}/></div>
      </>)}
      <Rule color={ac}/>
      <div style={{marginBottom:8}}><div style={{fontSize:10,color:ac,fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8,opacity:.8}}>{tab==="handouts"?"CONTINGUT":"BIO & INFO"}</div><Field value={item.bio||item.contingut||""} onChange={v=>tab==="handouts"?updH(origI,"contingut",v):updC(origI,"bio",v)} multi={true} accent={ac} ph="Afegir contingut..."/></div>
      <Rule/>
      <div><div style={{fontSize:10,color:"#9a8a70",fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8}}>NOTES DEL DM</div><Field value={item.info||item.notes_dm||""} onChange={v=>tab==="handouts"?updH(origI,"notes_dm",v):updC(origI,"info",v)} multi={true} accent={GOLD} ph="Notes privades..."/></div>
    </div>
  ):null;

  return(
    <div className="rv" style={{border:"1px solid "+BORDER,borderRadius:6,overflow:"hidden"}}>
      <div style={{background:BG2,borderBottom:"1px solid "+BORDER,padding:"12px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",border:"1px solid "+GOLD+"55",background:GOLD+"0f",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:12,lineHeight:1}}>⚜</span></div>
          <div><span className="rv-head" style={{fontSize:mob?13:15,color:"#f0e4b0",letterSpacing:".07em",fontWeight:600}}>Arxiu de Ravnica</span>{!mob&&<span style={{fontSize:13,color:"#8a7a60",fontStyle:"italic",fontFamily:"'Crimson Text',serif",marginLeft:10}}>v2.3</span>}</div>
          <span style={{fontSize:10,color:syncCol,marginLeft:4,fontFamily:"'Cinzel',serif",letterSpacing:".05em"}}>{syncLabel}</span>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            {!mob&&<span style={{fontSize:12,color:"#8a7a60",fontFamily:"'Cinzel',serif"}}>{hs.length}H · {cs.length}P · {eds.length}E</span>}
            {tab!=="aventino"&&<button className="rv-btn-gold" onClick={tab==="handouts"?newH:newC}>+ {tab==="handouts"?"HANDOUT":"PERSONATGE"}</button>}
          </div>
        </div>
        <div style={{display:"flex",gap:1}}>
          {TABS.map(t=><button key={t.id} onClick={()=>chTab(t.id)} style={{background:tab===t.id?BG:"transparent",border:"1px solid "+(tab===t.id?GOLD+"44":"transparent"),borderBottom:tab===t.id?"1px solid "+BG:"none",borderRadius:"3px 3px 0 0",padding:"6px 14px",fontSize:mob?10:12,cursor:"pointer",color:tab===t.id?GOLD:"#6a5a40",fontFamily:"'Cinzel',serif",letterSpacing:".07em",marginBottom:tab===t.id?-1:0,transition:"all .15s"}}>{t.icon} {mob?"":t.label.toUpperCase()}</button>)}
        </div>
      </div>
      {tab==="aventino"
        ?<AventinPanel edificis={eds} onUpdate={updE} sel={sel} onSelect={setSel} isMob={mob} showD={showD} setShowD={setShowD}/>
        :<div style={{display:"flex",flex:1,overflow:"hidden",position:"relative",background:BG}}>
          <div style={{width:mob?"100%":item?"36%":"100%",display:mob&&showD&&item?"none":"flex",flexDirection:"column",borderRight:!mob&&item?"1px solid "+BORDER:"none",transition:"width .2s"}}>
            <div style={{padding:"8px 10px",borderBottom:"1px solid "+BORDER,flexShrink:0,background:BG2}}>
              <div style={{position:"relative",marginBottom:7}}>
                <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:GOLD,opacity:.5,pointerEvents:"none"}}>⚜</span>
                <input type="text" placeholder={"Cerca "+(tab==="handouts"?"handouts":"personatges")+"..."} value={q} onChange={e=>{setQ(e.target.value);setSel(null);}} style={{width:"100%",padding:"7px 10px 7px 28px",borderRadius:3,border:"1px solid "+BORDER,background:"#0f0e0c",color:"#e0d4b8",WebkitTextFillColor:"#e0d4b8",fontFamily:"'Crimson Text',serif",fontSize:14,outline:"none"}}/>
              </div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                <button className="rv-filter" onClick={()=>setFilt("all")} style={{background:filt==="all"?GOLD+"22":"transparent",border:"1px solid "+(filt==="all"?GOLD+"55":BORDER),color:filt==="all"?GOLD:"#7a6a50"}}>TOTS</button>
                {tab==="chars"?AG.filter(g=>cs.some(c=>(c.tags||[]).includes(g))).map(g=><button key={g} className="rv-filter" onClick={()=>setFilt(g===filt?"all":g)} style={{background:filt===g?GC[g]+"1a":"transparent",border:"1px solid "+(filt===g?GC[g]+"55":GC[g]+"22"),color:filt===g?GC[g]:"#7a6a50"}}>{GS[g]} {g}</button>)
                :[...PJS,"Compartit","Només DM"].map(p=><button key={p} className="rv-filter" onClick={()=>setFilt(p===filt?"all":p)} style={{background:filt===p?(PC[p]||"#888")+"1a":"transparent",border:"1px solid "+(filt===p?(PC[p]||"#888")+"55":(PC[p]||"#888")+"22"),color:filt===p?PC[p]||"#888":"#7a6a50"}}>{p}</button>)}
              </div>
            </div>
            <div style={{overflowY:"auto",flex:1}}>
              {fltd.length===0&&<div style={{padding:30,color:"#8a7a60",fontSize:15,textAlign:"center",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>Cap registre als arxius...</div>}
              {fltd.map((x,i)=>{const c=mc(x,tab),isSel=!mob&&sel===i,sig=tab==="chars"&&x.tags&&x.tags[0]?GS[x.tags[0]]:"📜",cnx=tab==="chars"&&x.visible&&x.visible!=="Tots"?x.visible.split(",")[0].trim()+(x.visible.includes(",")?"…":""):null;
                return(<div key={i} onClick={()=>pick(i)} className="rv-row" style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid "+BORDER,background:isSel?BG3:"transparent",borderLeft:isSel?"2px solid "+c:"2px solid transparent",display:"flex",alignItems:"center",gap:10,transition:"background .1s"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:c+"14",border:"1px solid "+c+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:c}}>{sig}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,color:isSel?"#f0e4b0":"#d4c8a8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Cinzel',serif",letterSpacing:".03em",fontWeight:isSel?600:400}}>{x.nom}{PJS.includes(x.nom)&&<span style={{marginLeft:5,fontSize:9,background:c+"1a",color:c,borderRadius:2,padding:"1px 4px",fontFamily:"'Cinzel',serif",verticalAlign:"middle"}}>PJ</span>}</div>
                    <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                      {tab==="chars"?(x.tags||[]).map(t=><span key={t} style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:GC[t]+"15",color:GC[t],fontFamily:"'Cinzel',serif",letterSpacing:".03em"}}>{GS[t]} {t}</span>):x.propietari&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:(PC[x.propietari]||"#888")+"15",color:PC[x.propietari]||"#888",fontFamily:"'Cinzel',serif",letterSpacing:".03em"}}>{x.propietari}</span>}
                      {cnx&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:BG3,color:"#8a7a60",fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>👁 {cnx}</span>}
                    </div>
                  </div>
                  <span style={{color:isSel?c:BORDER,fontSize:14,flexShrink:0}}>›</span>
                </div>);
              })}
            </div>
            <div style={{padding:"8px 10px",borderTop:"1px solid "+BORDER,background:BG2,flexShrink:0}}>
              <button onClick={tab==="handouts"?newH:newC} style={{width:"100%",padding:"6px",fontSize:11,border:"1px dashed "+GOLD+"35",borderRadius:3,background:"transparent",color:"#7a6a50",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".08em"}}>+ NOU {tab==="handouts"?"HANDOUT":"PERSONATGE"}</button>
            </div>
          </div>
          {item&&(mob?showD?Detail:null:<div style={{flex:1,overflowY:"auto",position:"relative"}}>{Detail}</div>)}
        </div>
      }
    </div>
  );
}

function Root(){
  const [connected,setConnected]=useState(false);
  const hasCfg=!!localStorage.getItem("rv_fbcfg");
  if(!connected&&!hasCfg)return <SetupScreen onConnect={()=>setConnected(true)}/>;
  return <App/>;
}

ReactDOM.render(<Root/>,document.getElementById('root'));
</script>
</body>
</html>
