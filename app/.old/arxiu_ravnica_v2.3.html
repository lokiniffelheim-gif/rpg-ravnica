<head>
<meta charset="UTF-8">

<title>Arxiu de Ravnica v2.3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f0e0c}
.rv{font-family:'Crimson Text',Georgia,serif;background:#0f0e0c;color:#e0d4b8;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.rv-head{font-family:'Cinzel',serif}
.rv-row:hover{background:#1c1a16!important}
.rv-btn-gold{background:#a07830;color:#0f0e0c;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;padding:5px 14px;border-radius:3px;transition:filter .15s}
.rv-btn-gold:hover{filter:brightness(1.3)}
.rv-editable{cursor:text;padding:4px 8px;border-radius:3px;border:1px solid transparent;transition:border-color .15s}
.rv-editable:hover{border-color:#2a2520;background:#161410}
.rv-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.04em;cursor:pointer}
.rv-filter{font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.04em;border:1px solid transparent;transition:all .1s;background:transparent}
.rv-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.03em}
.rv-pill-x{background:none;border:none;cursor:pointer;color:inherit;font-size:11px;line-height:1;padding:0 0 0 2px;opacity:.6}
.rv-pill-x:hover{opacity:1}
.rv-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1c1a16;border:1px solid #3a3020;border-radius:4px;z-index:100;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.rv-check-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:3px;cursor:pointer;font-size:13px;font-family:'Crimson Text',Georgia,serif;color:#d4c8a8;transition:background .1s}
.rv-check-row:hover{background:#2a2520}
.rv-check-row input[type=checkbox]{appearance:none;-webkit-appearance:none;width:14px;height:14px;border:1px solid #5a4a30;border-radius:2px;background:#0f0e0c;cursor:pointer;flex-shrink:0;position:relative}
.rv-check-row input[type=checkbox]:checked{background:#a07830;border-color:#a07830}
.rv-check-row input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:11px;color:#0f0e0c}
.rv input,.rv textarea,.rv select{-webkit-appearance:none!important;appearance:none!important;background-color:#0f0e0c!important;background:#0f0e0c!important;color:#e0d4b8!important;-webkit-text-fill-color:#e0d4b8!important;border-radius:3px!important;opacity:1!important;font-family:'Crimson Text',Georgia,serif!important;font-size:15px!important}
.rv input::placeholder,.rv textarea::placeholder{color:#5a5040!important;-webkit-text-fill-color:#5a5040!important;opacity:1!important}
.rv input[type=checkbox]{width:14px!important;height:14px!important;font-size:unset!important}
.setup-input{width:100%;padding:8px 12px;border-radius:4px;border:1px solid #3a3020;background:#161410;color:#e0d4b8;font-family:'Crimson Text',serif;font-size:14px;outline:none;margin-bottom:8px}
.setup-input:focus{border-color:#a0783066}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#a0783040;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rv-detail{animation:fadeUp .16s ease}
.syncing{animation:pulse 1.5s infinite}
</style>
</head>

<script type="text/babel">
const {useState,useMemo,useEffect,useCallback,useRef} = React;

const HANDOUTS = [{"nom": "Notas de Laboratorio", "propietari": "Compartit", "visible": "Tots", "contingut": "Fajo desordenado de notas de laboratorio encontradas en la Cámara de Crecimiento Simic. Están principalmente redactadas en Vedalken y Tritón, aunque contiene notas en caracteres extraños escritos apresuradamente de forma enajenada y caótica que no reconoces. Su contenido revela que recientes acontecimientos han permitido realizar grandes avances en el campo de la gestión, control y regeneración de tejidos exánimes mediante la infusión de mana azul en metales no disponibles hasta la fecha (artículo pendiente de revisión por parte de los responsables del Zonot). Tras aplicar Comprensión idiomática : los caracteres extraños siguen sin ser reconocibles, pero parece que el metal azul tiene propiedades nigromanticas.", "notes_dm": ""}, {"nom": "Informe para el Juez de Manjatan", "propietari": "Compartit", "visible": "Tots", "contingut": "Fajo desordenado de notas de laboratorio encontradas en la Cámara de Crecimiento Simic. Están principalmente redactadas en Vedalken y Tritón, aunque contiene notas en caracteres extraños escritos apresuradamente de forma enajenada y caótica que no reconoces. Su contenido revela que recientes acontecimientos han permitido realizar grandes avances en el campo de la gestión, control y regeneración de tejidos exánimes.", "notes_dm": ""}, {"nom": "Espada de la Venganza", "propietari": "Compartit", "visible": "Tots", "contingut": "Espada, poco común (requiere vinculación) Extraída de un esqueleto con cabeza animal, al extraer la espada se ha desmenuzado en fina arena. Obtienes un bonificador +1 a tiradas de ataque y daño realizadas con esta espada mágica. Maldición: Esta espada está maldita y poseída por un espíritu vengativo. Estar vinculado a ella extiende la maldición hasta ti. Mientras permanezcas maldito, no estás dispuesto a desprenderte de la espada, manteniéndola contigo todo el tiempo. Mientras estés vinculado a esta arma, tienes desventaja en tiradas de ataque realizadas con otras armas distintas a esta. Además, mientras la espada este contigo, debes superar una tirada de salvación de Sabiduría con CD 15 cada vez que recibas daño en combate. Con una salvación fallida, debes atacar a la criatura que te lastimó hasta que tus puntos de golpe o los de la criatura que te lastimó queden reducidos a 0, o hasta que no puedas alcanzar a la criatura para realizar un ataque cuerpo a cuerpo contra ella. Puedes romper la maldición de forma normal. Alternativamente, conjurar destierro sobre la espada fuerza al espíritu vengativo a dejarla. La espada se convierte entonces en un arma +1 sin ninguna otra propiedad.", "notes_dm": ""}, {"nom": "Gema de Resplandor", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, Poco común Este prisma cuenta con 50 cargas. Mientras lo sostienes, puedes usar una acción para pronunciar una de sus tres palabras de mando para causar uno de los efectos siguientes: La primera palabra de mando causa que la gema desprenda luz brillante en un radio de 30 pies, y luz tenue en 30 pies adicionales. Este efecto no consume cargas. Dura hasta que usas una acción adicional para repetir la palabra de mando o hasta que uses otra función de la gema. La segunda palabra de mando consume 1 carga y causa que la gema dispare un brillante haz de luz a una criatura que puedas ver a menos de 60 pies de ti. La criatura debe superar con éxito una tirada de salvación de Constitución con CD 15 o quedar cegada por 1 minuto. La criatura puede repetir la tirada de salvación al final de cada uno de sus turnos, finalizando el efecto sobre ella si logra un éxito. La tercera palabra de mando consume 5 cargas y causa que la gema destelle con una luz cegadora en un cono de 30 pies que se origina en ti. Cada criatura dentro del cono debe hacer una tirada de salvación como si fuese golpeada por el haz creado por la segunda palabra de mando. Cuando todas las cargas se consumen, la gema se convierte en una joya no mágica valorada en 50 gp.", "notes_dm": ""}, {"nom": "Escudo Centinela", "propietari": "Compartit", "visible": "Tots", "contingut": "Armadura (escudo), poco común Mientras estas equipado con este escudo, tienes ventaja en las pruebas de iniciativa y de percepción (Sabiduría). El escudo está adornado con un símbolo de un ojo.", "notes_dm": ""}, {"nom": "Amuleto contra Detección y Localización", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, poco común (requiere vinculación) Mientras utilices este amuleto, te encuentras protegido ante la adivinación mágica. No puedes ser blanco de tal magia o percibido a través de métodos de escudriñamiento mágico.", "notes_dm": ""}, {"nom": "Aparato de Mizzium ", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, Poco común (requiere vinculación) La innovación es una búsqueda peligrosa, al menos de la forma en que los magos de la Liga Izzet se dedican a ella. Como protección contra el riesgo de que un experimento salga mal, han desarrollado un dispositivo para ayudar a canalizar y controlar su magia. Este aparato es una colección de correas de cuero, tubos flexibles, cilindros de vidrio, y placas, brazaletes y accesorios hechos de una aleación metálica mágica llamada mizzium, todo ensamblado en un arnés. El objeto pesa 8 libras. Mientras llevas el aparato de mizzium, se puede usar como un foco arcano. Además, puedes intentar lanzar un hechizo que no conoces o no has preparado. El hechizo que elijas debe estar en la lista de hechizos de tu clase y de un nivel para el que tengas un hueco de hechizo, y debes proporcionar los componentes del hechizo. Gastas un espacio para lanzar el hechizo de forma normal, pero antes de resolverlo debes hacer un chequeo de Inteligencia (Arcana). La DC es 10 + dos veces el nivel del espacio de hechizos que gastas para lanzar el hechizo. En un chequeo exitoso, lanzas el hechizo normalmente, usando tu DC de salvación de hechizo y el modificador de habilidad de lanzamiento de hechizo. En un chequeo fallido, lanzas un hechizo diferente al que querías. Determina al azar el hechizo que lanzaste tirando sobre la tabla para el nivel de la ranura de hechizo que gastaste. Si la ranura es de 6º nivel o superior, tira en la tabla para los hechizos de 5º nivel. Si intentas lanzar un truco que no conoces, la DC para el chequeo de Inteligencia (Arcana) es 10, y en un chequeo fallido, no hay efecto. 1ST-LEVEL SPELLS d6 Spell 1 burning hands 2 chaos bolt (see chapter 2) 3 color spray 4 faerie fire 5 fog cloud 6 thunderwave 2ND·LEVEL SPELLS d6 Spell 1 blur 2 gust of wind 3 heat metal 4 Melfs acid arrow 5 scorching ray 6 shatter 3RD·LEVEL SPELLS d6 Spell 1 fear 2 feign death 3 fireball 4 gaseous form 5 sleet storm 6 stinking cloud 4TH-LEVEL SPELLS d4 Spell 1 confusion 2 conjure minor elementals 3 Evard's black tentacles 4 ice storm 5TH·LEVEL SPELLS d4 Spell 1 animate objects 2 cloud kill 3 cone of cold 4 flame strike", "notes_dm": ""}, {"nom": "Sombrero de disfraz", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, Poco común (requiere vinculación) Mientras lleves puesto este sombrero, puedes usar una acción para lanzar el hechizo \"Alterar el propio aspecto\", a voluntad (siempre y solamente en modo \"Cambio de apariencia\"). El conjuro finaliza si te quitas el sombrero.", "notes_dm": ""}, {"nom": "Perla de Poder", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, poco común (requiere vinculación con un lanzador de conjuros) Puedes usar una acción para entonar la palabra de mando de esta perla y recuperar un espacio de conjuro gastado de hasta nivel 3. Una vez que haya utilizado la perla, no puede ser utilizada de nuevo hasta el próximo amanecer.", "notes_dm": ""}, {"nom": "Cota de mallas Adamantina", "propietari": "Compartit", "visible": "Tots", "contingut": "Cota de mallas, Poco común Esta armadura está reforzada con adamantina, una de las sustancias mas duras que existen. Mientras la uses, cualquier golpe critico contra ti, se convierte en un golpe normal.", "notes_dm": ""}, {"nom": "Baraja de Ilusiones", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, Poco común Esta baraja contiene un conjunto de carta de pergamino. La baraja completa tiene 34 cartas. La magia de la baraja, solo funciona si se extraen las cartas aleatoriamente (puedes utilizar un mazo alterado de cartas para simular el mazo). Puedes usar una acción para robar una carta de la baraja al azar, y arrojarla al suelo en un punto a 30 pies. La ilusión de una o más criaturas se crean sobre la carta lanzado, y permanece hasta que sea disipada. Una criatura ilusoria parece real, del tamaño adecuado, y se comporta como si se tratara de una criatura real (como se presenta en el Manual de Monstruos), excepto que no puede hacer ningún daño. Mientras te encuentres dentro de los 120 pies de la criatura ilusoria y puedas verla, puedes utilizar una acción para moverla mágicamente a cualquier lugar hasta a 30 pies de su carta. Cualquier interacción física con la criatura ilusoria revela que es una ilusión, ya que los objetos pasan a través de ella. Alguien que utilice una acción para inspeccionar visualmente la criatura, la identifica como una ilusión con una prueba con éxito de Inteligencia (investigación) a CD 15. La criatura aparece entonces translúcida. La ilusión dura hasta que su carta se mueva o la ilusión se disipe. Cuando la ilusión termina, la imagen en su carta desaparece, y la carta no puede ser utilizada nuevamente.", "notes_dm": ""}, {"nom": "Pergamino Mágico - Nube de Dagas", "propietari": "Compartit", "visible": "Tots", "contingut": "Nivel 2, conjuración Tiempo de lanzamiento: 1 acción Alcance: 60 pies (12 casillas, 18 m) Duración: Concentración, hasta 1 minuto Llenas el aire de dagas giratorias de un cubo de 5 pies (1 casilla, 1,5 m) de lado. El cubo se crea en un punto a tu elección dentro del alcance del conjuro. Cuando una criatura entra en el área del conjuro por primera vez en un turno o comienza su turno dentro del", "notes_dm": ""}, {"nom": "Guantelete de Fuerza de Ogro", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, Poco común (requiere vinculación) Tu característica de Fuerza es 19 mientras lleves puestos estos guanteletes. No tienen efecto sobre tu Fuerza si ya es 19 o más.", "notes_dm": ""}, {"nom": "Par de Pistolas Ballesta Crueles", "propietari": "Compartit", "visible": "Tots", "contingut": "2x Pistola Ballesta, raro Cuando obtienes un 20 en tu tirada de ataque con esta arma mágica, el objetivo recibe 7 puntos de daño extra del mismo tipo que el arma.", "notes_dm": ""}, {"nom": "Bolsa de Contención", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, poco común Esta bolsa tiene un espacio interior considerablemente más grande que sus dimensiones exteriores, apenas 2 pies de diámetro en la boca y 4 pies de profundo. La bolsa puede contener hasta 500 libras, no excediendo los 64 pies cúbicos de volumen. El saco pesa 15 libras, independientemente de su contenido. Sacar un objeto del interior requiere una acción. Si la bolsa es sobrecargada, pinchada, o rasgada, se rompe y se destruye, y su contenido es dispersado en el plano astral. Si a la bolsa se le da la vuelta desde dentro hacia afuera, su contenido se vacía intacto, pero la bolsa debe volver a su forma anterior de ser usada nuevamente. Las criaturas que respiran dentro del saco pueden vivir hasta un número de minutos igual a 10 dividido por el número de criaturas (mínimo un minuto), después del cual comienzan a asfixiarse. Colocar una bolsa de contención dentro de un espacio extra dimensional creado por un Morral practico de Heward, un agujero portable, o un objeto similar, destruye ambos objetos instantáneamente, y abre una puerta al plano astral. La puerta se origina donde uno de los objetos, fue colocado dentro del otro. Cualquier criatura a 10 pies de la puerta es succionada dentro, y aparece en una localización aleatoria del plano astral. Después la puerta se cierra. La puerta es de un sentido y no puede ser reabierta.", "notes_dm": ""}, {"nom": "Deposito común en el Santísimo Banco Sindical Orzhov", "propietari": "Compartit", "visible": "Tots", "contingut": "8650 cp (A) 22950 cp (O) 262 ep (A) 557 gp (B) Cáliz de cobre con filigrana de plata (25 gp) 2x relicarios de oro con un retrato pintado en su interior (25 gp) Set de dados de hueso grabados (25 gp) Pequeño espejo con marco de madera pintada (25 gp)", "notes_dm": ""}, {"nom": "3x Poción de Heroísmo (+3)", "propietari": "Compartit", "visible": "Tots", "contingut": "Duración: 1 minuto Una criatura voluntaria que toques es imbuida con valentía. Hasta que el conjuro finalice, la criatura es inmune a ser asustada y gana Puntos de Golpe temporales iguales a tu modificador de característica de lanzamiento de conjuros al comienzo de cada uno de sus turnos. Cuando el conjuro finaliza, el objetivo pierde cualquier remanente de Puntos de Golpe temporales de este conjuro.", "notes_dm": ""}, {"nom": "Correo Misterioso", "propietari": "Compartit", "visible": "Tots", "contingut": "\"He estado ausente durante muchas lunas, hubo contratiempos inesperados. Explica qué es lo que necesitas.\" - Firmado: Un aliado discreto. -------------------------------------------- 12/XII/21 Ocurren cosas que me afectan indirecta y directamente. Tengo enemigos por todas partes y necesito tus servicios: - Un hermano goblin esta desaparecido. necesito saber que ha sido de él. se encuentra en la calle de hojalata [doy informacion] . - Cierto goblin esta ocasionando el malestar entre gremios... necesito saber de él .[explico datos e informacion y sobretodo doy el nombre de arkady para ver si puede relacionarlos]. Necesito nombres para interrogar... y no sera solo con palabras. - Grukurg ha sido engañado y presuntamente estafado. capataz 2 dice haber visto alguien , apodado \" el fantasma \". necesito información, datos... se que abunda el mana negro en el acto de aquel dia.[ explico el caso del prestamista y que empiece por su circulo]. - Pesha... quiero saber de su pasado. Que vida llevó, quien era antes de ser la posadera del cuerno de oro.y sobretodo ... que objeto le podria gustar. Favor por favor. La confianza debe de ser mutua. Ayudame y la mano de la justicia estara de tu lado. 13/XII/21 Investigaré estos datos que me comentas sobre Arkady y Pesha y el Goblin desaparecido. Sobre el fantasma: Es un misterioso y poderoso ente, y su misterio sólo es comparable a su poder. Puede ser una figura clave para el futuro o un mero espectador, no sabemos cual es su propósito aún. No parece estar relacionado con la presunta estafa. 28/II/2022 No necesito que busques al goblin ... cierto amigo ya me ha ayudado en encontrar su paradero. Tenia familia.Búscala. Estará retenida en algun lado, por miembros de mi orden, si los tienen la chusma de tajik o de algun colaborador .Dame una pista fiable, un lugar...solo pido eso para poder emmendar mi falta y empezar con mi venganza... 03/III/2022 Fue muy fortuito que alguien le diera a tu amigo la indicación correcta y la motivación dónde buscar a tu amigo. Pronto el viento susurrará alguna otra pista.", "notes_dm": ""}, {"nom": "Bandera Trofeo del Basilisco", "propietari": "Compartit", "visible": "Tots", "contingut": "+1 a las tiradas de Persuasión", "notes_dm": ""}, {"nom": "Goblin Moñeco", "propietari": "Compartit", "visible": "Tots", "contingut": "Objeto maravilloso, poco común Tras una desafortunada noche envuelta en el misterio (en la que se quedo to' moñeco en un WC), el espíritu de Kasz trascendió su cuerpo y alcanzo cotas de iluminación cósmica solo al alcance de gurús y sabios. Aunque nadie sabe si su alma se encuentra se encuentra en el infierno o en el paraíso, su cuerpo sigue semi-momificado en Ravnica, donde es adorado por sus seguidores el que fue antaño un verdadero héroe del Aventino. Proporciona ventaja en las tiradas de habilidad basadas en el Carisma si el Gremio del objetivo comparte al menos un color de maná con el Gremio del usuario, o desventaja de no compartir ninguno. Sin efecto sobre los que no tengan ninguna afiliación gremial.", "notes_dm": ""}];
const CHARS = [{"nom": "Ezzio Salvatore", "bio": "Ezzio se crió en el orfanato Orzov , aprendió de jovencito a esconderse de los curas pedófilos. Una vez adulto decidió pagar su deuda a la orden sirviendo para el gremio. Nunca le había gustado el hedonismo y la falsa moral de muchos miembros de la orden, sin embargo aún creía en la doctrina: \" sólo necesitan un buen guía \".", "info": "Albert camus contracta alarma Cresh manda pastelitos a los gruul Mimic en la boveda creash manda papeles iluminati", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Wundyr Somo", "bio": "Mi palabra es mi espada, mis hermanos son mi gremio y mi guia es mi señora Aurelia. Mediador hasta que observo algun acto malvado. Temperamental cuando no atienden a razones. Impartiré justicia vaya donde vaya.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Yarog (HorseLuis)", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Manjatan", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Svikull Rusl", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Marchena", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Kasz", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Extraño de agua", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Krasis Cat 1", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Hybrid Spy", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Tritón Salvaje", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Hybrid Shocker", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Hybrid Brute", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Krasis Cat 2", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Sorbete", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "El Vocero", "bio": "El Vocero es un Homúnculo: estos pequeños seres mágicos son creados por magos Azorius para llevar a cabo tareas sencillas y recados. Gritón y algo malhumorado, el Vocero está atado mágicamente a la Oficina Capilla de la plaza principal del Aventino, desde donde realiza anuncios y presta servicio a sus habitantes. El resto del tiempo lo dedica al mantenimiento de la oficina y a tareas administrativas, aunque en general hace todo lo posible para holgazanear y trabajar lo menos posible.", "info": "Homunculus Tiny construct, neutral Armor Class 13 (Natural Armor) Hit Points 5 (2d4) Speed 20 ft., fly 40 ft. STR 4 (-3) DEX 15 (+2) CON 11 (+0) INT 10 (+0) WIS 10 (+0) CHA 7 (-2) Damage Immunities Poison Condition Immunities Charmed, Poisoned Senses Darkvision 60 Ft., passive Perception 10 Languages Understands The Languages Of Its Creator But Can't Speak Challenge 0 (10 XP) Telepathic Bond . While the homunculus is on the same plane of existence as its master, it can magically convey what it senses to its master, and the two can communicate telepathically. Actions Bite. Melee Weapon Attack: +4 to hit, reach 5 ft., one creature. Hit: (1d1) piercing damage. The target must succeed on a dc 10 constitution saving throw or be poisoned for 1 minute If the saving throw fails by 5 or more, the target is instead poisoned for 5 (1d10) minutes and unconscious while poisoned in this way", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Pesha la Tabernera", "bio": "Pesha es la propietaria de El Cuerno de Oro, la tasca de la plaza del Aventino, y una minotaura con muy malas pulgas. Llegó al barrio un buen día con su tatuaje Rakdos en el brazo, algo de dinero y actitud a raudales, decidida a llevar su propia taberna y a no hablar de un pasado misterioso. Cargar barriles y echar borrachos le ha permitido mantener un impresionante estado de forma física, y aunque llevar su propio negocio es una ocupación a tiempo completo, hay quien dice que la ha visto entrenar junto Iván por las noches.", "info": "Minotaur Large monstrosity, chaotic evil Armor Class 14 (Natural Armor) Hit Points 76 (9d10+27) Speed 40 ft. STR 18 (+4) DEX 11 (+0) CON 16 (+3) INT 6 (-2) WIS 16 (+3) CHA 9 (-1) Skills Perception +7 Senses Darkvision 60 Ft., passive Perception 17 Languages Abyssal Challenge 3 (700 XP) Charge . If the minotaur moves at least 10 ft. straight toward a target and then hits it with a gore attack on the same turn, the target takes an extra 9 (2d8) piercing damage. If the target is a creature, it must succeed on a DC 14 Strength saving throw or be pushed up to 10 ft. away and knocked prone. Labyrinthine Recall . The minotaur can perfectly recall any path it has traveled. Reckless . At the start of its turn, the minotaur can gain advantage on all melee weapon attack rolls it makes during that turn, but attack rolls against it have advantage until the start of its next turn. Actions Greataxe. Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: (2d12 + 4) slashing damage. Gore. Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: (2d8 + 4) piercing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Kotyali la Cazadora", "bio": "Ver a Kotyali en medio del trajín de las calles de Ravnica es un espectáculo curioso: combina la apariencia salvaje propia de una cazadora centaura -cubierta de pieles y escarificaciones tribales- con el porte de una urbanita acostumbrada a las multitudes y al comercio. Abierta y directa en el trato al prójimo, su amable tono de voz siempre encuentra el camino al corazón de quienes la escuchan, y no es extraño verla reir mientras vende piezas de caza en el mercado. Pero no se debe confundir su actitud con candidez, pues aquellos que lo hacen no tardan en conocer las garras de Céfiro, su fiel halcón de caza....", "info": "Centaur Large monstrosity, neutral good Armor Class 12 Hit Points 45 (6d10+12) Speed 50 ft. STR 18 (+4) DEX 14 (+2) CON 14 (+2) INT 9 (-1) WIS 13 (+1) CHA 11 (+0) Skills Athletics +6, Perception +3, Survival +3 Senses passive Perception 13 Languages Elvish, Sylvan Challenge 2 (450 XP) Charge . If the centaur moves at least 30 ft. straight toward a target and then hits it with a pike attack on the same turn, the target takes an extra 10 (3d6) piercing damage. Actions Multiattack. The centaur makes two attacks: one with its pike and one with its hooves or two with its longbow. Pike. Melee Weapon Attack: +6 to hit, reach 10 ft., one target. Hit: (1d10 + 4) piercing damage. Hooves. Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: (2d6 + 4) bludgeoning damage. Longbow. Ranged Weapon Attack: +4 to hit, reach 150/600 ft., one target. Hit: (1d8 + 2) piercing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Shazel Bara, Chaman del clan", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Obez el Prestamista", "bio": "No hay mucho que contar de Obez, pues ha elevado a la categoría de arte la mediocridad. Gordo y perezoso, lo único que le mantiene trabajando en el Sindicato son sus deudas (y las amenazas de aquellos que las quieren ver saldadas). La única fuente de placer que le queda es hundir en la desdicha a aquellos a los que ve felices, lo que junto a una mentalidad retorcida y una actitud paciente le convierte en un excelente prestamista.", "info": "Cultist Medium humanoid (any race), any non-good alignment Armor Class 12 (Leather Armor) Hit Points 9 (2d8) Speed 30 ft. STR 11 (+0) DEX 12 (+1) CON 10 (+0) INT 10 (+0) WIS 11 (+0) CHA 10 (+0) Skills Deception +2, Religion +2 Senses passive Perception 10 Languages Any One Language (Usually Common) Challenge 1/8 (25 XP) Dark Devotion . The cultist has advantage on saving throws against being charmed or frightened. Actions Scimitar. Melee Weapon Attack: +3 to hit, reach 5 ft., one creature. Hit: (1d6 + 1) slashing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Iván el Cocinero", "bio": "Puede que la cocina de la taberna no sea exquisita, pero a aquellos que trabajan todo la jornada en talleres, almacenes y mercados, les proporciona un momento de apreciada tranquilidad y bienestar. El encargado de este curioso festín diario es Iván, cocinero del Cuerno de Oro, y dado lo que entra en la cocina y lo que sale en los platos, es quedarse corto (quedad tranquilos, el universo recupera su equilibrio cósmico cuando los comensales visitan el excusado). Si sus gruesos dedos agarrando cuchillos o sus hablar lento y torpe no os ponen nerviosos, quizá sus ojos perturbadoramente abiertos de par en par lo hagan. Que eso no os inquiete, Iván es (casi) siempre un buen muchacho (aunque mejor que no le pidáis recetas).", "info": "Berserker Medium humanoid (any race), any chaotic alignment Armor Class 13 (Hide Armor) Hit Points 67 (9d8+27) Speed 30 ft. STR 16 (+3) DEX 12 (+1) CON 17 (+3) INT 9 (-1) WIS 11 (+0) CHA 9 (-1) Senses passive Perception 10 Languages Any One Language (Usually Common) Challenge 2 (450 XP) Reckless . At the start of its turn, the berserker can gain advantage on all melee weapon attack rolls during that turn, but attack rolls against it have advantage until the start of its next turn. Actions Greataxe. Melee Weapon Attack: +5 to hit, reach 5 ft., one target. Hit: (1d12 + 3) slashing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Grukurg el Tintador", "bio": "Trabajar duramente en un sitio asfixiante y apestoso catorce horas diarias pone de mal humor a cualquiera, pero si encima eres el propietario y no conoces vacaciones, enfermedad o descanso, tienes a Grukurg. Este ogro se pasa el día curtiendo pieles de toda clase de animales y bestias en su taller, y su actitud oscila entre el trabajo obsesivo y la furia psicótica, dependiendo en gran medida -pero no solamente- de los gases que emanan de las cubas, la cantidad de faena acumulada y los errores de sus empleados.", "info": "Ogre Large giant, chaotic evil Armor Class 11 (Hide Armor) Hit Points 59 (7d10+21) Speed 40 ft. STR 19 (+4) DEX 8 (-1) CON 16 (+3) INT 5 (-3) WIS 7 (-2) CHA 7 (-2) Senses Darkvision 60 Ft., passive Perception 8 Languages Common, Giant Challenge 2 (450 XP) Actions Greatclub. Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: (2d8 + 4) bludgeoning damage. Javelin. Melee Weapon Attack: +6 to hit, reach 5 ft., one target. Hit: (2d6 + 4) piercing damage. Javelin. Ranged Weapon Attack: +6 to hit, reach 30/120 ft., one target. Hit: (2d6 + 4) piercing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Ten el Pescadero", "bio": "", "info": "currante, familiar, ha patit durant la crisi de l'aigua, donde pesca??", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Morai la Capataz", "bio": "Vivir sin la protección de un gremio en Ravnica no es fácil, pero a Morai le compensa: es su propia jefa (Obras Aventino SA), mantiene su equipo de construcción (una plantilla de goblins ingobernables) y no tiene que dar explicaciones a (casi) nadie. Algo reservada y tímida, tiende a guardarse para si sus opiniones personales, aunque en sus proyectos despliega su amplio abanico de conocimientos técnicos y es capaz de arrollar a cualquier ingenuo que pretenda enseñarle algo.", "info": "CounterFlux Blastseeker Medium humanoid (any race), chaotic neutral Armor Class 13 (16 with mage armor) Hit Points 39 (6d8+12) Speed 30 ft. STR 13 (+1) DEX 16 (+3) CON 15 (+2) INT 18 (+4) WIS 11 (+0) CHA 14 (+2) Saving Throws Con +4, Wis +2 Skills Arcana +6, Perception +2 Senses passive Perception 12 Languages Common plus any one language Challenge 2 (450 XP) Counterflux Overcast (Recharge 5-6). The blastseeker can create an additional effect immediately after casting a spell . Roll a d6 to determine the effect: 1- 3. The blastseeker creates a 15-foot-radius invisible sphere centered on itself that lasts until the end of its next turn. Creatures in the sphere have disadvantage on saving throws against spells and other magical effects. 4- 6. The blastseeker c reates a 15-foot-radius invisible sphere centered on itse lf t hat lasts until the end of its next turn. Creatures in the sphere have advantage on saving throws against spells and other magical effects. Innate Spellcasting. The blastseeker's innate spellcasting ability is Intelligence (spell save DC 14, +6 to hit with spell attacks). The blastseeker can innately cast the following spells, requiring no components other than its lzzet gear, which doesn't function for others : 3/day each: enlarge/reduce, mage armor (self only) , scorching ray 1/day each: counterspell, dispel magic, protection from energy Actions Rapier. Melee Weapon Attack: +5 to hit, rea ch 5 ft., one target. Hit: 7 (ld8 + 3) pie rcing dam age. Putejada per Obez", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Cresh el Vendedor de Comida Ambulante", "bio": "Descrito como el empresario menos exitoso de Ravnica, el \"emprendedor aventurero\" del Aventino, Cresh es más conocido por vender productos “mayormente compuestos de carne” a almas desprevenidas. Ha vendido desde un extraño líquido verde hecho por monjes que vivían en una montaña según una antigua receta, consejos \"astrales\", lecciones de artes marciales por correo (bajo el alias \"Gran Maestro Cresh\"), auténticas y genuinas reliquias sagradas, globos de nieve de recuerdo y espacio publicitario en el boletín del gremio de Vendedores de Comida ambulante (del cual ostenta a la vez el cargo de Presidente, Portavoz, Notario y Portero). Su mejor venta son los productos intangibles; la mercancía física tiende a dificultar un poco su modelo de negocio...", "info": "Lizardfolk Medium humanoid (lizardfolk), neutral Armor Class 15 (Natural Armor, Shield) Hit Points 22 (4d8+4) Speed 30 ft., swim 30 ft. STR 7 (-2) DEX 13 (+1) CON 10 (+0) INT 7 (-2) WIS 12 (+1) CHA 15 (+2) Skills Persuasion+4, Perception+3, Insight+5 Senses passive Perception 13 Languages Draconic Challenge 1/2 (100 XP) Hold Breath . The lizardfolk can hold its breath for 15 minutes. Actions Multiattack. The lizardfolk makes two melee attacks, each one with a different weapon. Bite. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d6) piercing damage. Heavy Club. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d6) bludgeoning damage. Javelin. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d6) piercing damage. Javelin. Ranged Weapon Attack: +2 to hit, reach 30/120 ft., one target. Hit: (1d6) piercing damage. Spiked Shield. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d6) piercing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Elon Tusk el Mercader de grano", "bio": "Si en el mercado escuchas maldiciones, lamentos y ruido de cosas rompiéndose, es posible que al girarte te encuentres a Elon en medio del estropicio. Ser un loxodon (aunque seas el último del linaje Tusk) no evita ser descuidado ni torpe, aunque eso le ha permitido tener la plaza más espaciosa del mercado (nadie quiere arriesgarse a estar a su alrededor). Probablemente uno de los mercaderes más ricos del Aventino, ha hecho su fortuna vendiendo grano a buen precio. Eso y una empatía cuasi-mística con la naturaleza y la gentes del barrio hacen de Elon un personaje popular y entrañable, si bien conviene evitarlo si llevas algo frágil encima.", "info": "Druid Medium humanoid (any race), any alignment Armor Class 14 (16 With Barkskin) Hit Points 27 (5d8+5) Speed 30 ft. STR 10 (+0) DEX 12 (+1) CON 15 (+2) INT 12 (+1) WIS 16 (+3) CHA 11 (+0) Skills Medicine +5, Nature +4, Perception +5 Senses passive Perception 15 Languages Druidic, Loxodon and Sylvan Challenge 2 (450 XP) Spellcasting . The druid is a 4th-level spellcaster. Its spellcasting ability is Wisdom (spell save DC 12, +4 to hit with spell attacks). It has the following druid spells prepared: • Cantrips (at will): druidcraft, produce flame, shillelagh • 1st level (4 slots): entangle, longstrider, speak with animals, thunderwave • 2nd level (3 slots): animal messenger, barkskin Keen Smell. Thanks to your sensitive trunk, you have advantage on Wisdom (Perception), Wisdom (Survival), and Intelligence (Investigation) checks that involve smell. Actions Quarterstaff. Melee Weapon Attack: +2 to hit, reach 5 ft., (+4 with shillelagh), one target. Hit: (1d6) bludgeoning damage plus (1d8 + 2)bludgeoning damage. Or with shillelagh or if wielded with two hands", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Dhalya Macav la Comerciante", "bio": "Dhalya es el resultado acumulado de generación tras generación de mercaderes Macav. Toda una vida de aventuras comerciales a lo ancho del plano le ha proporcionado una extensa red de contactos, colaboradores y proveedores, así como un sinfín de anécdotas y vivencias. Si necesitas cualquier cosa, no dudes de que ella puede conseguirlo, pero cuidado, sus tarifas no son aptas para todos los bolsillos. Ya sea con materias primas, objetos de lujo o servicios, es una negociadora brutal, nunca pierde la oportunidad de sacar tajada de cualquier situación y siempre consigue cerrar un buen trato.", "info": "Noble Medium humanoid (any race), any alignment Armor Class 15 (Breastplate) Hit Points 9 (2d8) Speed 30 ft. STR 11 (+0) DEX 12 (+1) CON 11 (+0) INT 12 (+1) WIS 14 (+2) CHA 16 (+3) Skills Deception +5, Insight +4, Persuasion +5 Senses passive Perception 12 Languages Any Two Languages Challenge 1/8 (25 XP) Actions Rapier. Melee Weapon Attack: +3 to hit, reach 5 ft., one target. Hit: (1d8 + 1) piercing damage. Reactions Parry. The noble adds 2 to its AC against one melee attack that would hit it. To do so, the noble must see the attacker and be wielding a melee weapon.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Maeve la Carterista", "bio": "La plaza del Aventino, como cualquier zona ajetreada, es conocida por ser un lugar habitual de pequeños robos y hurtos. Lo que no tanta gente conoce es que no sólo los crímenes son pequeños, sino que también existen criminales de esa medida: Maeve es un buen ejemplo de ello. Vivir en un mundo hecho a medida de gigantes no ha hecho más que facilitarle la vida a esta hada y a su banda de carteristas, que disponen de mil lugares donde esconderse, y que convierte cualquier botín en un tesoro. Lo único que evita que se conviertan en una verdadera plaga es su falta de concentración y ambiciones mayores, pero la vida puede ser muy fácil cuando robar tu peso en oro no es solamente una expresión.", "info": "Sprite Tiny fey, neutral good Armor Class 15 (Leather Armor) Hit Points 2 (1d4) Speed 10 ft., fly 40 ft. STR 3 (-4) DEX 18 (+4) CON 10 (+0) INT 14 (+2) WIS 13 (+1) CHA 11 (+0) Skills Perception +3, Stealth +8 Senses passive Perception 13 Languages Common, Elvish, Sylvan Challenge 1/4 (50 XP) Actions Longsword. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d1) slashing damage. Shortbow. Ranged Weapon Attack: +6 to hit, reach 40/160 ft., one target. Hit: (1d1) piercing damage. The target must succeed on a dc 10 constitution saving throw or become poisoned for 1 minute If its saving throw result is 5 or lower, the poisoned target falls unconscious for the same duration, or until it takes damage or another creature takes an action to shake it awake Heart Sight. The sprite touches a creature and magically knows the creature's current emotional state. If the target fails a DC 10 Charisma saving throw, the sprite also knows the creature's alignment. Celestials, fiends, and undead automatically fail the saving throw. Invisibility. The sprite magically turns invisible until it attacks or casts a spell, or until its concentration ends (as if concentrating on a spell). Any equipment the sprite wears or carries is invisible with it.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Sila, Tribuno de la Legión", "bio": "Uno de los más notables políticos y militares Boros en el último siglo, perteneciente al bando de los optimates. Tras distinguirse en la revueltas obreras Gruul, el asedio del fuerte de la Senda Verde contra los Selesnya y la pacificación de los pozos de Sangre Rakdos, los intentos de Sila por arrebatarle el control del ejército que debía combatir a Tajic le llevaron a denunciarle para intentar restaurar una Legión cada vez más mermada y sobrecargada. Pese a contar con el apoyo de varios lugartenientes angelicales de renombre, Tajic contaba con demasiado soporte dentro de la Legión, por lo que Sila se retiró de la vida militar para intentar hacer carrera política. Esa era su intención al menos, hasta que la llegada de la Guerra de la Chispa reavivo su fuego justiciero y le llevo una vez más a ser de nuevo el firme escudo de Ravnica, defensor de los débiles y vengador de agravios.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Aurelio, Líder del Clan", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Arkady el Alborotador", "bio": "Arkady no ha tenido una vida fácil: su padre era zapatero y tenía su propio taller; y aunque al principio fue un éxito, más tarde cayó en bancarrota y la familia se encontró viviendo en la pobreza. Fue entonces cuando su padre se convirtió en alcohólico y golpeaba a su mujer e hijo en estado de embriaguez. Tras años de abusos, Arkady y su madre le abandonaron y comenzaron una vida errante, viviendo con vagabundos y sin techo durante la siguiente década. Cuando ya era un adoslecente se mudaron a la casa de un amigo de la familia, un pastor Orzhov, quien más tarde le consiguió una plaza a Arkady en la Escuela Eclesiástica. Aunque se metió en muchas peleas, destacó en el ámbito académico, demostrando su talento en las clases de pintura y teatro, escribiendo su propia poesía, y cantando como niño de coro. Durante su infancia se enfrentó a varios problemas graves de salud: una infección de viruela le dejó cicatrices en la cara; y a la edad de 12 años se lesionó gravemente al ser atropellado por un centauro, probablemente la causa de una discapacidad de por vida en su brazo izquierdo. Gracias a una beca que le permitía estudiar a un precio reducido, se matriculó en el Seminario Espiritual Orzhov. Se unió a los 600 sacerdotes en formación que se alojaban allí, y obtuvo altas calificaciones. Continuó escribiendo poesía: cinco de sus poemas, sobre temas como la naturaleza, la tierra y el patriotismo, se publicaron bajo seudónimo en las revistas dominicales. Sin embargo, a medida que crecía, Arkady perdió el interés por los estudios sacerdotales: sus notas bajaron, y fue confinado repetidamente en una celda por su comportamiento rebelde. El diario del seminario señaló que se declaraba ateo, se retiraba de las oraciones y se negaba a quitarse el sombrero ante los monjes. Se unió a un club de libros prohibidos en la escuela; estuvo especialmente influenciado por libros pro-revolucionarios y textos profanos Rakdos. Arkady se dedicó a la teoría sociopolítica, que entonces estaba en auge en Ravnica, una de las diversas formas de socialismo opuestas a las autoridades Azorius que gobiernan la ciudad. Por la noche, asistía a reuniones obreras secretas y acudía a asambleas Gruul, donde empezó a demostrar un gran poder de oratoria. Finalmente, abandonó el seminario para unirse a una tribu errante Gruul, y nunca regresó.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Ikram la Contrabandista", "bio": "La Guerra de la chispa conmocionó los cimientos de todo el plano, haciendo desaparecer edificios e incluso barriadas enteras, y forzando el desplazamiento de miles de refugiados a zonas más seguras. Para gente como Ikram, quien no parece tener un hogar al que volver, ha implicado buscarse la vida de formas más creativas para poder sobrevivir y medrar en una ciudad que no concede muchas oportunidades (y unos pocos psicotrópicos de contrabando nunca han hecho daño a nadie)", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Bookworm el Consigliere", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Kakí Skýla, Lugarteniente del Enjambre Ochran", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Tajic, Espada de la Legión", "bio": "Como segundo al mando, Tajic se opuso al plan de Aurelia de unirse con los otros gremios en su lucha contra las fuerzas de Bolas. Tajic cree que los Boros sólo pueden confiar en los Boros. Está convencido de que cualquier esfuerzo de paz entre los gremios está condenado al fracaso sin el Pacto del Gremio. Los Boros, argumenta, estarían mejor gastando su energía para hacerse más fuertes y así poder mantener el frágil equilibrio que existe ahora y proteger a los inocentes cuando la balanza se inclina. Aurelia cree que su actitud negativa corre el riesgo de envenenar los corazones de los otros Boros y socavar cualquier esfuerzo de paz.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Sargento Instructor Gough", "bio": "Gough \"Ojo de Halcón\" fue una vez uno de los cuatro caballeros Boros y líder de los Wojek, la fuerza de asalto de élite de la Legión. Sin embargo, Gough no carecía de enemigos: su visión fue afectada por villanos que le consideraban un gigante salvaje, y pensaron que cubriéndole con resina los agujeros de los ojos de su yelmo le podrían derrotar (aunque en realidad esto no disminuyó su capacidad de lanzar jabalinas con precisión mortal). Cegado, dedica sus días a preparar a las nuevas generaciones de cadetes, y pasa el tiempo reflexionando filosóficamente sobre la virtud, el valor y el significado de la palabra \"legionario\".", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Informante Secreto", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Mecenas misterioso", "bio": "", "info": "Araithia Shokta", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Emeritus Tobias Forge", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Glenn Danzing, Sicario del Sindicato", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Padre Messiah Marcolin", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Niv-Mizzet, el Dracogenio", "bio": "Niv-Mizzet, comúnmente conocido como el Mente de Fuego,es un antiguo dragón de color marrón rojizo de Ravnica obsesionado con la omnisciencia. A pesar de su tamaño, es capaz de moverse con ligereza y gracia. Tiene una cola retorcida, largas alas con bordes azules, un largo cuello, membranas espinosas alrededor de su cabeza y largos cuernos oscuros. El intelecto del Mente de Fuego excede al de los mortales estándar en varios niveles, y es conocido por muchos inventos ingeniosos que actualmente sirven a los ciudadanos de Ravnica, siendo el más conocido el casi indestructible, pero fácilmente utilizable y forjable metal, el mizzium. Poseedor de una arrogancia y vanidad que iguala su vasto intelecto y su tremendo poder, Niv-Mizzet dirige la investigación y los experimentos de Izzet desde hace más de 10.000 años, a menudo desde su laboratorio privado en la cima de Nivix, sede gremial de los Izzet. Como el nuevo Pacto del Gremio Viviente, el Mente de Fuego sirve ahora como guardián de la propia Ravnica. Debido a su extrema edad, su triunfo sobre numerosos desafíos, y su estatus de mago dragón, Niv-Mizzet posee un conocimiento que ningún otro posee, incluyendo hechizos que se han perdido en el tiempo y armas cuyas hechuras se han perdido.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Sestri, Degana del Laboratorio de Tormentas y Electricidad", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Coldie, Genio Inestable", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Rotxar, Cultista Tatuador", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Tai On, Justicar del Senado", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Randall, Comunero Pacifista", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Khatnas, Juez de Asuntos Internos", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Nebum Gerava, Arbites del Senado", "bio": "Vigila a tus hermanos, su pecado de herejía es tu pecado de tolerancia.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Gasz, Matón de la Calle de Hojalata", "bio": "", "info": "Extorsiona a la familia de Brir", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Luda Manson, Productora y Cazatalentos", "bio": "Luda Manson era la mejor representante de artistas de la pasada década y, aunque ahora todo ha cambiado, ella no. Cuando Kill-Pesha, su actriz más conocida, la abandona inesperadamente, el mundo de Luda se tambalea. Junto a Kasz, su nueva promesa, y Rotxar, un tatuador pendenciero, que acabará convertido en parte de la familia, Luda se lanza desesperada al descubrimiento de nuevo talento. Una búsqueda que le hará encontrar su lugar en la profesión y en el mundo tras la guerra.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Ylldiane, Intendente Mayor", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Ayudantes de laboratorio Izzet", "bio": "Aún son aprendices, pero algún día podrían llegar a maestros.....", "info": "Commoner Medium humanoid (any race), any alignment Armor Class 10 Hit Points 4 (1d8) Speed 30 ft. STR 10 (+0) DEX 10 (+0) CON 10 (+0) INT 10 (+0) WIS 10 (+0) CHA 10 (+0) Senses passive Perception 10 Languages Any One Language (Usually Common) Challenge 0 (10 XP) Actions Club. Melee Weapon Attack: +2 to hit, reach 5 ft., one target. Hit: (1d4) bludgeoning damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Reclutas Azorius", "bio": "Siempre queda tanto papeleo que hacer...", "info": "Soldier Medium humanoid (any race), any alignment Armor Class 18 (chain mail, shield) Hit Points 16 (3d8+3) Speed 30 ft. STR 13 (+1) DEX 12 (+1) CON 12 (+1) INT 10 (+0) WIS 11 (+0) CHA 11 (+0) Skills Perception +2, Athletics +3 Senses passive Perception 12 Languages Any One Language (Usually Common) Challenge 1/2 (100 XP) Actions Multiattack. The soldier makes two melee attacks. Longsword. Melee Weapon Attack: +3 to hit, reach 5 ft ., one target. Hit: 6 (ld8 + 2) slashing damage, or 7 (1d10 + 2) slashing damage if used with two hands.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Giagia, Ama de llaves del Hogar Ancestral Dalverjar", "bio": "Ikram es el nombre falso bajo el que se esconde Giagia, la antigua ama de llaves del Hogar Ancestral Dalverjar, y lleva más de 3 siglos sirviendo a esta familia devkarin de la corte del sur. Su habilidad para preparar tinturas, pociones y venenos es legendaria entre los Golgari de cierto renombre, pero su manejo de la daga no se limita a la preparación de ingredientes. Para ella, la caída del hogar solo fue parte del ciclo de las cosas: sabe que todo se desmorona y se pudre al final, y luego una nueva vida surge de esa podredumbre. El tiempo pasa inevitablemente, trayendo tanto destrucción como nueva creación a todas las cosas, y ahora que ha encontrado al heredero perdido de los Dalverjar, pondrá todo su empeño a servirles una vez más.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Escuadrón Boros", "bio": "La justicia no se va a servir sola...", "info": "Soldier Medium humanoid (any race), any alignment Armor Class 18 (chain mail, shield) Hit Points 16 (3d8+3) Speed 30 ft. STR 13 (+1) DEX 12 (+1) CON 12 (+1) INT 10 (+0) WIS 11 (+0) CHA 11 (+0) Skills Perception +2, Athletics +3 Senses passive Perception 12 Languages Any One Language (Usually Common) Challenge 1/2 (100 XP) Actions Multiattack. The soldier makes two melee attacks. Longsword. Melee Weapon Attack: +3 to hit, reach 5 ft ., one target. Hit: 6 (ld8 + 2) slashing damage, or 7 (1d10 + 2) slashing damage if used with two hands.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Anarquistas Gruul", "bio": "Raramente desarmados, raramente sobrios...", "info": "Anarch Small or Medium humanoid (any race), chaotic neutral Armor Class 13 (hide armor) Hit Points 11 (2d8+2) Speed 30 ft. STR 14 (+2) DEX 13 (+1) CON 12 (+1) INT 9 (-1) WIS 11 (+0) CHA 10 (+0) Skills Perception +2, Survival +2 Senses passive Perception 10 Languages Any One Language (Usually Common) Challenge 1/4 (50 XP) Aggressive . As a bonus action, the anarch can move up to its speed toward a hostile creature it can see. Siege Monster. The anarch deals double damage to objects and structures. Actions Spiked Club. Melee Weapon Attack: +4 to hit, reach 5 ft., one target. Hit: 6 (ld8 + 2) piercing damage, or 7 (1d10 + 2) piercing damage if used with two hands.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Troupe Rakdos", "bio": "El espectáculo debe continuar...", "info": "Cultist Medium humanoid (any race), any non-good alignment Armor Class 12 (Leather Armor) Hit Points 9 (2d8) Speed 30 ft. STR 11 (+0) DEX 12 (+1) CON 10 (+0) INT 10 (+0) WIS 11 (+0) CHA 10 (+0) Skills Deception +2, Religion +2 Senses passive Perception 10 Languages Any One Language (Usually Common) Challenge 1/8 (25 XP) Dark Devotion . The cultist has advantage on saving throws against being charmed or frightened. Actions Scimitar. Melee Weapon Attack: +3 to hit, reach 5 ft., one creature. Hit: (1d6 + 1) slashing damage.", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Basilisk", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Bandidos", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "André el Herrero", "bio": "André, como muchos Loxodones, proviene de las arboledas y ensenadas del Cónclave Selesnya; pero poco más se sabe de sus orígenes. Es conocida sin embargo la traición sufrida a manos de sus compañeros vernadi, y su posterior salvación por parte de un gigante Boros, con quién adquirió una deuda de sangre. Tras abandonar a aquellos a quien una vez llamó hermanos, sus creencias y su hogar, se alistó en las filas de la legión. Allí su alma descubrió una nueva llamada al sentir el calor de la fragua, el sudor de los herreros y el latir de una hermandad de martillos golpeando el metal al ritmo de sus ardientes corazones. Sus golpes son rápidos y precisos, y su técnica moldea el metal y lo convierte en herramientas certeras que en manos de ángeles hacen el trabajo de demonios. Ha aprendido a tener largas charlas con martillo y yunque, con fuego y metal: puede el guerrero blandir el arma más poderosa o vestir la coraza más tenaz, que un herrero sabe que toda armadura, escama de dragón o mizzium encantado esconden un punto vulnerable…", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Rezana, Médico Azorius", "bio": "", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Alysa la Sastre", "bio": "molt inteligent, es fa la tonta y la superficial, molt diva, mata hari", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Albert Camus de la Oficina del Banco", "bio": "Financer, agarrat, depresiu, salary man, desagradable amb tothom pq esta fins la polla", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "(la de correos)", "bio": "Mistica xmen, changelling", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Aiker Bosset", "bio": "Despues del dolor causado por la guerra, no dejará que esta se vuelva a producir o por lo menos tendrá suficiente poder como para aplacarla. Incansable en la búsqueda de poder, utilizará todos los recursos Simic a su disposición para evolucionar a una forma de vida superior, si la naturaleza no evoluciona lo suficientemente rápido, le dará un empujón. Uniros a la lucha o no os interpongáis. Cualquiera que busque la guerra será aniquilado.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Los fieles seguidores del Maestro, el Evolucionador de hombres", "bio": "El Maestro dijo: “Los sanos no tienen necesidad de médico, sino los enfermos”. Él vino realmente a buscar, levantar y salvar a los que están perdidos, a los débiles y abatidos. ¡Sí, Maestro, vienes a levantar al débil y lo tomas en tus brazos! ¡Qué poderosa verdad! Verdaderamente el Maestro te toma en Sus brazos de amor en este día, querido(a) amigo(a). Él te conduce hacia la Verdad y la mejora personal.", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Trisz, Legionario Caido (Fallecido)", "bio": "Pese a que el hambre y el miedo siempre han estado presentes en su vida, Trisz nunca ha considerado tener una infancia infeliz. Criado en barrios que ya eran pobres antes de la Guerra de la Chispa, él y su familia malvivían como parias, con la incertidumbre constante de donde vendría el próximo bocado (si es que llegaba), pero siempre se tuvieron los unos a los otros. Su hermana en particular era una fuente constante de cándida alegría, y un solo abrazo suyo era capaz de hacerle olvidar las palizas recibidas durante el día o las desgracias vividas. Que ella pudiera seguir jugando con sus juguetes y tuviera una vida mejor fue lo que le empujó a alistarse (aunque ella odiase esa decisión). Con su última exhalación susurró su nombre.... LEGIO AETERNA VICTRIX", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}, {"nom": "Pandora, Espíritu Servicial", "bio": "https://5e.tools/bestiary/indentured-spirit-ggr.html", "info": "", "tags": ["Guildless"], "controlledby": "DM", "visible": "Tots"}];
