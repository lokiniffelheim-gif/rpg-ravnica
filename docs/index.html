<style>*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#13110e}
.rv{font-family:'Crimson Text',Georgia,serif;background:#13110e;color:#ede3c8;height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:16px}
.rv-head{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.05em}
.rv-row:hover{background:#221f18!important}
.rv-btn-gold{background:#c09040;color:#0f0e0c;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;padding:5px 14px;border-radius:3px;transition:filter .15s}
.rv-btn-gold:hover{filter:brightness(1.2)}
.rv-editable{cursor:text;padding:4px 8px;border-radius:3px;border:1px solid transparent;transition:border-color .15s}
.rv-editable:hover{border-color:#4a4035;background:#1a1812}
.rv-filter{font-size:10px;padding:2px 8px;border-radius:10px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.04em;border:1px solid transparent;transition:all .1s;background:transparent;font-weight:500}
.rv-pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.03em}
.rv-pill-x{background:none;border:none;cursor:pointer;color:inherit;font-size:11px;line-height:1;padding:0 0 0 2px;opacity:.6}
.rv-pill-x:hover{opacity:1}
.rv-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1812;border:1px solid #584830;border-radius:4px;z-index:200;padding:4px;box-shadow:0 4px 16px rgba(0,0,0,.7)}
.rv-check-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:3px;cursor:pointer;font-size:14px;font-family:'Crimson Text',Georgia,serif;color:#ede3c8;transition:background .1s}
.rv-check-row:hover{background:#2a2520}
.rv-check-row input[type=checkbox]{appearance:none;-webkit-appearance:none;width:14px;height:14px;border:1px solid #7a6858;border-radius:2px;background:#13110e;cursor:pointer;flex-shrink:0;position:relative}
.rv-check-row input[type=checkbox]:checked{background:#c09040;border-color:#c09040}
.rv-check-row input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:2px;font-size:11px;color:#0f0e0c}
.rv-check-row input[type=checkbox]:disabled{opacity:.4;cursor:default}
.rv input,.rv textarea,.rv select{-webkit-appearance:none!important;appearance:none!important;background-color:#13110e!important;background:#13110e!important;color:#ede3c8!important;-webkit-text-fill-color:#ede3c8!important;border-radius:3px!important;opacity:1!important;font-family:'Crimson Text',Georgia,serif!important;font-size:15px!important}
.rv input::placeholder,.rv textarea::placeholder{color:#7a6858!important;-webkit-text-fill-color:#7a6858!important;opacity:1!important}
.rv input[type=checkbox]{width:14px!important;height:14px!important;font-size:unset!important}
.setup-input{width:100%;padding:8px 12px;border-radius:4px;border:1px solid #584830;background:#1a1812;color:#ede3c8;font-family:'Crimson Text',serif;font-size:14px;outline:none;margin-bottom:8px}
.setup-input:focus{border-color:#c0904066}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#c0904060;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rv-detail{animation:fadeUp .16s ease}
.syncing{animation:pulse 1.5s infinite}</style>
</head>

let db=null,auth=null,storage=null;
async function initFirebase(cfg){
  if(!window.firebase){
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js");
    loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js").catch(()=>{});
  }
  try{
    const app=window.firebase.apps.length?window.firebase.app():window.firebase.initializeApp(cfg);
    db=window.firebase.firestore(app);
    auth=window.firebase.auth(app);
    try{storage=window.firebase.storage(app);}catch(e){storage=null;}
    return true;
  }catch(e){db=null;auth=null;storage=null;return false;}
}
async function uploadToStorage(nom,dataUrl){
  if(!storage||!dataUrl.startsWith('data:'))return null;
  try{
    const ref=storage.ref('ravnica/imgs/'+Date.now()+'_'+encodeURIComponent(nom).slice(0,60));
    const res=await fetch(dataUrl);const blob=await res.blob();
    await ref.put(blob,{contentType:blob.type});
    return await ref.getDownloadURL();
  }catch(e){console.warn('Storage upload failed:',e);return null;}
}
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector('script[src="'+src+'"]')){res();return;}const s=document.createElement("script");s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
async function signIn(){try{const provider=new window.firebase.auth.GoogleAuthProvider();await auth.signInWithPopup(provider);return{};}catch(e){return{error:e.code==="auth/popup-closed-by-user"?"Has tancat la finestra de Google":e.message};}}
async function doSignOut(){if(auth)await auth.signOut();}
async function loadUserProfile(uid){try{const d=await db.collection("users").doc(uid).get();return d.exists?d.data():null;}catch(e){return null;}}
async function ensureUserProfile(uid,email){const p=await loadUserProfile(uid);if(!p){await db.collection("users").doc(uid).set({email,rol:null,personatge:null});}return p||{email,rol:null,personatge:null};}
function visibleToUser(visible,personatge){if(!visible||visible==="Tots")return true;if(visible==="Solo DM"||visible==="Nadie")return false;return visible.split(",").map(s=>s.trim()).includes(personatge);}
function lsSave(key,data){
  try{
    localStorage.setItem(key,JSON.stringify(data));
    return true;
  }catch(e){
    // QuotaExceededError: intentar alliberar espai eliminant dades antigues
    console.warn("localStorage quota exceeded per",key,e);
    try{
      const keysToTry=['rv_h4','rv_c4','rv_e1'];
      keysToTry.filter(k=>k!==key).forEach(k=>localStorage.removeItem(k));
      localStorage.setItem(key,JSON.stringify(data));
      return true;
    }catch(e2){
      console.error("No s'ha pogut desar a localStorage:",e2);
      return false;
    }
  }
}
function lsLoad(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch(e){return def;}}
function compressImage(dataUrl,size=400,quality=0.80){return new Promise(res=>{const img=new Image();img.onload=()=>{const sq=Math.min(img.width,img.height);const sx=Math.round((img.width-sq)/2);const sy=Math.round((img.height-sq)/2);const s=Math.min(size,sq);const c=document.createElement('canvas');c.width=s;c.height=s;c.getContext('2d').drawImage(img,sx,sy,sq,sq,0,0,s,s);res(c.toDataURL('image/jpeg',quality));};img.src=dataUrl;});}
function lsSaveImgs(base,imgs){Object.entries(imgs).forEach(([nom,b64])=>{const k=base+'__'+nom;if(!b64){try{localStorage.removeItem(k);}catch(e){}return;}try{localStorage.setItem(k,b64);}catch(e){console.warn("No s'ha pogut desar imatge:",nom,e);}});}
function lsLoadImgs(base){try{localStorage.removeItem(base+'_imgs');}catch(e){}const imgs={},p=base+'__';for(let i=localStorage.length-1;i>=0;i--){const k=localStorage.key(i);if(k&&k.startsWith(p))imgs[k.slice(p.length)]=localStorage.getItem(k)||'';}return imgs;}
function stripImages(items,imgKey){const imgs={};const clean=items.map(x=>{const c={...x};if(c[imgKey]&&c[imgKey].startsWith('data:')){imgs[c.nom]=c[imgKey];delete c[imgKey];}return c;});return{clean,imgs};}
function mergeImages(items,imgs,imgKey){return items.map(x=>({...x,[imgKey]:imgs[x.nom]||x[imgKey]||""}));}
async function saveData(key,items,imgKey){
  const{clean,imgs}=imgKey?stripImages(items,imgKey):{clean:items,imgs:{}};
  if(db){try{await db.collection("ravnica").doc(key).set({data:JSON.stringify(clean)});}catch(e){}}
  lsSave(key,clean);
  if(imgKey){const existing=lsLoadImgs(key);const merged={...existing,...imgs};Object.keys(merged).forEach(k=>{if(!merged[k])delete merged[k];});lsSaveImgs(key,merged);}
}
async function loadData(key,def,imgKey){
  let data=null;
  if(db){try{const r=await db.collection("ravnica").doc(key).get();if(r.exists)data=JSON.parse(r.data().data);}catch(e){}}
  if(!data)data=lsLoad(key,null);if(!data)data=def;
  if(imgKey){
    const initMap=key==="chars"?IMG_CHARS:key==="edificis"?IMG_EDIFICIS:{};
    const lsImgs=lsLoadImgs(key);
    const validPfx=[GH_BASE+"personajes/",GH_BASE+"Aventino/",GH_BASE+"misc/"];
    data=data.map(x=>{let img=x[imgKey]||lsImgs[x.nom]||(initMap[x.nom]?GH_BASE+initMap[x.nom]:"");if(img&&!img.startsWith("data:")&&!img.startsWith("http")){const ok=validPfx.some(p=>img.startsWith(p));if(!ok)img=initMap[x.nom]?GH_BASE+initMap[x.nom]:"";}return{...x,[imgKey]:img};});
  }
  return data;
}

function visToArr(v){
  if(!v||v==="Tots")return["Tots"];
  if(v===""||v==="Nadie")return["Nadie"];
  return v.split(",").map(s=>s.trim()).filter(Boolean);
}
function arrToVis(arr){if(!arr||arr.length===0)return"Nadie";if(arr.includes("Tots"))return"Tots";if(arr.includes("Nadie"))return"Nadie";return arr.join(", ");}
function mc(item,tab,vt){if(tab==="aventino")return GC[item.gremi]||"#8a7a5a";if(tab==="handouts")return PC[item.propietari]||"#8a7a5a";const t=vt||(item.tags||[]);return t.length?GC[t[0]]||"#8a7a5a":"#8a7a5a";}
function initials(n){return(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");}
function parsePers(p){if(!p)return[];if(Array.isArray(p))return p;return p.split(/[,\/]/).map(s=>s.trim()).filter(Boolean);}

<script type="text/babel" charset="UTF-8">
function PersonajesTagSel({value,onChange,chars,readOnly,onNavToChar}){
  const arr=parsePers(value);
  const available=(chars||[]).filter(c=>!arr.includes(c.nom)).sort((a,b)=>a.nom.localeCompare(b.nom));
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>
      {arr.map((nom,i)=>{
        const ch=chars?.find(x=>x.nom===nom);
        const col=(ch?.tags||[])[0]?GC[ch.tags[0]]||"#8a7a5a":"#8a7a5a";
        return(<span key={i} className="rv-pill" style={{background:col+"1e",border:"1px solid "+col+"55",color:col}}>
          <span onClick={onNavToChar?()=>onNavToChar(nom):undefined} style={{cursor:onNavToChar?"pointer":"default",textDecoration:onNavToChar?"underline dotted":"none"}}>{nom}</span>
          {!readOnly&&<button className="rv-pill-x" onClick={()=>onChange(arr.filter((_,j)=>j!==i))}>×</button>}
        </span>);
      })}
      {arr.length===0&&<span style={{fontSize:12,color:"#7a6858",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>—</span>}
      {!readOnly&&<select onChange={e=>{if(e.target.value)onChange([...arr,e.target.value]);e.target.value="";}} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:"1px dashed "+GOLD+"55",background:"transparent",color:GOLD,cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".04em",outline:"none"}}>
        <option value="">+ añadir...</option>
        {available.map(c=><option key={c.nom} value={c.nom}>{c.nom}</option>)}
      </select>}
    </div>
  );

  </div>);
}

      {!isPlayer&&<><Rule/><div><div style={{fontSize:10,color:"#9a8a68",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:3,paddingLeft:8}}>💡 NOTES DM</div><Field value={item.ideas||""} onChange={v=>upd("ideas",v)} multi={true} accent={GOLD}/></div></>}
    </div>

  return(<div style={{display:"flex",flex:1,overflow:"hidden",position:"relative",background:BG}}>

      <div style={{padding:"8px 10px",borderBottom:"1px solid "+BORDER,flexShrink:0,background:BG2}}>

          </div>);

      <div style={{padding:"8px 10px",borderTop:"1px solid "+BORDER,background:BG2,flexShrink:0}}>

    {item&&(isMob?showD?Detail:null:<div style={{flex:1,overflow:"hidden",position:"relative",display:"flex"}}>{Detail}</div>)}
  </div>);
}

function App({user,onUsersPanel}){

  useEffect(()=>{(async()=>{try{setHs(await loadData("handouts",HANDOUTS,"img"));setCs(await loadData("chars",CHARS,"avatar"));setEds(await loadData("edificis",EDIFICIS_DEFAULT,"avatarCustom"));}catch(e){console.error(e);}})();},[]);

    saveTimer.current=setTimeout(async()=>{try{await saveData(key,data,imgKey);}catch(e){console.error(e);}setSaved("✦ Guardado");setTimeout(()=>setSaved(""),2500);},600);
  },[]);

  const updH=(i,f,v)=>{const h=hs.map((x,j)=>j===i?{...x,[f]:v}:x);setHs(h);saveKey("handouts",h);};
  const updC=(i,f,v)=>{const c=cs.map((x,j)=>j===i?{...x,[f]:v}:x);setCs(c);saveKey("chars",c);};

  const newH=()=>{const h=[...hs,{nom:"Nuevo objeto",propietari:"Compartido",visible:"Tots",contingut:"",notes_dm:"",img:""}];setHs(h);saveKey("handouts",h);setTab("handouts");setQ("");setFilt("all");setSort("none");setSel(h.length-1);setShowD(true);};

  const getOI=useCallback(fi=>tab==="handouts"?hs.findIndex(x=>x.nom===fi.nom):cs.findIndex(x=>x.nom===fi.nom),[hs,cs,tab]);

  },[items,q,filt,sort,tab,effectiveUser]);

  const canSeeDimir=useMemo(()=>effectiveUser.rol==="dm"||(cs.find(c=>c.nom===effectiveUser.personatge)?.tags||[]).includes("Dimir"),[effectiveUser,cs]);
  const secureT=useCallback((tags,charNom)=>{
    if(effectiveUser.rol==="dm")return tags||[];
    if(charNom===effectiveUser.personatge)return tags||[];
    if(canSeeDimir&&!PJS.includes(charNom))return tags||[];
    return(tags||[]).filter(t=>t!=="Dimir");
  },[effectiveUser,canSeeDimir]);

  const item=sel!==null&&sel<fltd.length?fltd[sel]:null;
  const origI=item?getOI(item):-1;
  const ac=item?mc(item,tab,tab==="chars"?secureT(item.tags,item.nom):undefined):GOLD;
  const isPJ=item&&PJS.includes(item.nom);
  const charEdificis=useMemo(()=>tab==="chars"&&item?eds.filter(e=>parsePers(e.personajes).includes(item.nom)&&(effectiveUser.rol==="dm"||e.activo)):[],[tab,item,eds,effectiveUser]);

  function chTab(t){setTab(t);setQ("");setFilt("all");setSort("none");setSel(null);setShowD(false);}
  function pick(i){setSel(i===sel&&!mob?null:i);setShowD(true);}
  function del(){if(!item)return;if(!window.confirm('Eliminar "'+item.nom+'"?'))return;if(tab==="handouts"){const h=hs.filter((_,i)=>i!==origI);setHs(h);saveKey("handouts",h);}else{const c=cs.filter((_,i)=>i!==origI);setCs(c);saveKey("chars",c);}setSel(null);setShowD(false);}

  const syncCol=saved==="⏳"?"#8a7a5a":saved?"#c09040":db?"#5a9a3a":"#6a5a40";
  const syncLabel=saved||(db?"☁ Firebase":"⬡ local");

  const imgSrc=item?(item.img||item.avatar||""):"";
  const isOwnChar=effectiveUser.rol==="dm"||(tab==="chars"&&item?.nom===effectiveUser.personatge);
  const Detail=item?(<div className="rv-detail" style={{flex:1,display:"flex",flexDirection:mob?"column":"row",overflow:"hidden",position:"relative",...(mob?{position:"absolute",top:0,left:0,right:0,bottom:0,background:BG,zIndex:10}:{})}}>

    <div style={{width:mob?"100%":"33%",height:mob?200:"auto",flexShrink:0,position:"relative",background:ac+"12",borderRight:mob?"none":"1px solid "+BORDER,borderBottom:mob?"1px solid "+BORDER:"none",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {imgSrc
        ?<img src={imgSrc} alt={item.nom} onError={e=>{e.target.style.display="none"}} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",display:"block"}}/>
        :<span style={{fontSize:48,fontWeight:"bold",color:ac+"44",fontFamily:"'Cinzel',serif",userSelect:"none"}}>{item.nom.split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()}</span>
      }
      {isOwnChar&&<div style={{position:"absolute",bottom:8,right:8,display:"flex",gap:4}}>
        <label style={{cursor:"pointer",fontSize:11,padding:"3px 8px",background:BG2+"dd",border:"1px solid "+BORDER,borderRadius:3,color:GOLD,fontFamily:"'Cinzel',serif",letterSpacing:".04em"}}>
          📷
          <input type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result,400);tab==="handouts"?updH(origI,"img",c):updC(origI,"avatar",c);};r.readAsDataURL(f);e.target.value='';}}/>
        </label>
        {imgSrc&&<button onClick={()=>tab==="handouts"?updH(origI,"img",""):updC(origI,"avatar","")} style={{fontSize:11,padding:"3px 8px",background:BG2+"dd",border:"1px solid #c4303055",borderRadius:3,color:"#c43030",cursor:"pointer"}}>✕</button>}
      </div>}
    </div>

    {/* Columna dreta — info */}
    <div style={{flex:1,overflowY:"auto",padding:"16px 18px",display:"flex",flexDirection:"column",gap:10,minWidth:0}}>
      {mob&&<button onClick={()=>setShowD(false)} style={{background:"none",border:"none",cursor:"pointer",color:GOLD,fontSize:13,padding:0,fontFamily:"'Cinzel',serif",letterSpacing:".06em",alignSelf:"flex-start",marginBottom:2}}>← VOLVER</button>}
      <div style={{display:"flex",alignItems:"flex-start",gap:6}}>
        <div style={{flex:1,minWidth:0}}><Field value={item.nom} onChange={v=>tab==="handouts"?updH(origI,"nom",v):updC(origI,"nom",v)} accent={ac} readOnly={effectiveUser.rol!=="dm"}/></div>
        <div style={{display:"flex",gap:4,flexShrink:0,paddingTop:4}}>
          {effectiveUser.rol==="dm"&&<button onClick={del} style={{background:"none",border:"1px solid #c4303044",borderRadius:3,cursor:"pointer",color:"#c43030",fontSize:13,padding:"3px 7px"}}>🗑</button>}
          {!mob&&<button onClick={()=>{setSel(null);setShowD(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#9a8a68",fontSize:20,padding:"0 2px",lineHeight:1}}>×</button>}
        </div>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
        {tab==="chars"?(<>{secureT(item.tags,item.nom).map((t,ti)=>effectiveUser.rol==="jugador"
          ?<span key={ti} style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:(GC[t]||"#8a7a5a")+"22",border:"1px solid "+(GC[t]||"#8a7a5a")+"55",color:GC[t]||"#8a7a5a",fontFamily:"'Cinzel',serif"}}>{GS[t]} {t}</span>
          :<GuildTagSel key={ti} value={t} opts={canSeeDimir?AG:AG.filter(g=>g!=="Dimir")} cm={GC} onChange={v=>{const nt=[...(item.tags||[])];nt[ti]=v;updC(origI,"tags",nt);}} onRemove={()=>{const nt=(item.tags||[]).filter((_,j)=>j!==ti);updC(origI,"tags",nt.length?nt:["Guildless"]);}}/>)}
          {effectiveUser.rol!=="jugador"&&<button onClick={()=>updC(origI,"tags",[...(item.tags||[]),"Guildless"])} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:"1px dashed "+GOLD+"55",background:"transparent",color:GOLD,cursor:"pointer",fontFamily:"'Cinzel',serif",opacity:.7}}>+ gremio</button>}</>)
        :(<Sel value={item.propietari} opts={[...PJS,"Compartido","Solo DM"]} onChange={v=>updH(origI,"propietari",v)} cm={PC}/>)}
        {isPJ&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:ac+"25",border:"1px solid "+ac+"55",color:ac,fontFamily:"'Cinzel',serif",cursor:"default"}}>PJ</span>}
      </div>
      {tab==="chars"&&<div>
        <div style={{fontSize:9,color:"#9a8a68",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:4,paddingLeft:8}}>📍 LOCALIZACIONES</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,paddingLeft:4}}>
          {charEdificis.length===0
            ?<span style={{fontSize:12,color:"#7a6858",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>—</span>
            :charEdificis.map(e=>{const col=GC[e.gremi]||"#8a7a5a";return(<span key={e.nom} onClick={()=>navToEdifici(e.nom)} className="rv-pill" style={{background:col+"1e",border:"1px solid "+col+"55",color:col,cursor:"pointer",textDecoration:"underline dotted"}}>{e.nom}</span>);})}
        </div>
      </div>}
      {tab==="chars"&&effectiveUser.rol==="dm"&&(<div style={{display:"flex",flexDirection:"column",gap:6}}>
        <div style={{fontSize:12,padding:"3px 10px",borderRadius:10,background:BG2,border:"1px solid "+BORDER,display:"inline-flex",gap:6,alignItems:"center",alignSelf:"flex-start"}}>
          <span style={{opacity:.5,fontSize:11}}>🎮</span>
          <span style={{color:"#baa880",fontFamily:"'Cinzel',serif",fontSize:9,letterSpacing:".06em"}}>CONTROL</span>
          <span style={{color:"#ede3c8",fontFamily:"'Crimson Text',serif",fontSize:13}}>{item.controlledby}</span>
        </div>
        <div><div style={{fontSize:9,color:"#baa880",fontFamily:"'Cinzel',serif",letterSpacing:".1em",marginBottom:4}}>CONOCE A:</div>
          <VisibleSelect value={item.visible||"Tots"} onChange={v=>updC(origI,"visible",v)}/>
        </div>
      </div>)}
      <Rule color={ac}/>
      <div><div style={{fontSize:10,color:ac,fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8,opacity:.8}}>{tab==="handouts"?"DESCRIPCIÓN":"BIO E HISTORIA"}</div>
        <Field value={item.bio||item.contingut||""} onChange={v=>tab==="handouts"?updH(origI,"contingut",v):updC(origI,"bio",v)} multi={true} accent={ac} readOnly={tab==="handouts"?effectiveUser.rol!=="dm":!isOwnChar}/>
      </div>
      {tab==="chars"&&<div><div style={{fontSize:10,color:ac,fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8,opacity:.8}}>RANGO GREMIAL</div>
        <RangoTable value={item.rangoGremial} onChange={v=>updC(origI,"rangoGremial",v)} accent={ac} readOnly={effectiveUser.rol!=="dm"}/>
      </div>}
      {tab==="chars"&&canSeeDimir&&<div><div style={{fontSize:10,color:GC["Dimir"],fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8,opacity:.8}}>👁 RANGO DE LAS SOMBRAS</div>
        <RangoTable value={item.rangoSombras} onChange={v=>updC(origI,"rangoSombras",v)} accent={GC["Dimir"]} readOnly={effectiveUser.rol!=="dm"}/>
      </div>}
      {effectiveUser.rol==="dm"&&<><Rule/>
      <div><div style={{fontSize:10,color:"#9a8a68",fontFamily:"'Cinzel',serif",letterSpacing:".12em",marginBottom:4,paddingLeft:8}}>NOTAS DEL DM</div>
        <Field value={item.info||item.notes_dm||""} onChange={v=>tab==="handouts"?updH(origI,"notes_dm",v):updC(origI,"info",v)} multi={true} accent={GOLD}/>
      </div></>}
    </div>
  </div>):null;

  return(<div className="rv" style={{border:"1px solid "+BORDER,borderRadius:6,overflow:"hidden",position:"relative"}}>
    <div style={{position:"absolute",inset:0,backgroundImage:"url('assets/img/misc/Header.png')",backgroundSize:"cover",backgroundPosition:"center 30%",opacity:0.07,zIndex:0,pointerEvents:"none"}}/>
    {previewAs&&<div style={{position:"relative",zIndex:1,background:"#c09040",color:"#0f0e0c",padding:"5px 14px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <span style={{fontSize:11,fontFamily:"'Cinzel',serif",letterSpacing:".06em",fontWeight:600}}>👁 VISTA COMO: {previewAs.toUpperCase()}</span>
      <button onClick={()=>{setPreviewAs(null);setSel(null);setShowD(false);}} style={{marginLeft:"auto",fontSize:11,padding:"3px 12px",borderRadius:3,border:"1px solid #0f0e0c55",background:"#0f0e0c22",color:"#0f0e0c",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".05em",fontWeight:600}}>← VOLVER AL DM</button>
    </div>}
    <div style={{backgroundImage:"url('assets/img/misc/Header.png')",backgroundSize:"cover",backgroundPosition:"center 35%",borderBottom:"1px solid "+BORDER+"88",padding:"18px 18px 0",flexShrink:0,position:"relative",zIndex:1}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, #13110eb8 0%, #13110edd 55%, #13110e 100%)",pointerEvents:"none"}}/>
      <div style={{position:"relative",zIndex:1}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <div style={{width:22,height:22,borderRadius:"50%",border:"1px solid "+GOLD+"66",background:GOLD+"0f",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:12,lineHeight:1}}>⚜</span></div>
        <div><span className="rv-head" style={{fontSize:mob?13:15,color:"#f8eecc",letterSpacing:".07em"}}>Los archivos de Ravnica</span>{!mob&&<span style={{fontSize:12,color:"#aa9870",fontStyle:"italic",fontFamily:"'Crimson Text',serif",marginLeft:10}}>v{VERSION}</span>}</div>
        <span style={{fontSize:10,color:syncCol,marginLeft:4,fontFamily:"'Cinzel',serif",letterSpacing:".05em"}}>{syncLabel}</span>
        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",position:"relative"}}>
          {!mob&&<span style={{fontSize:11,color:"#aa9870",fontFamily:"'Cinzel',serif"}}>{hs.length}H · {cs.length}P · {eds.length}E</span>}
          {!mob&&<span style={{fontSize:10,color:"#7a6858",fontFamily:"'Cinzel',serif"}} title={user.email}>{user.rol==="dm"?"DM":user.personatge?.split(" ")[0]||user.email.split("@")[0]}</span>}
          {user.rol==="dm"&&(<div style={{position:"relative"}}>
            <button onClick={()=>setShowPreviewSel(s=>!s)} title="Previsualitza com a jugador" style={{fontSize:11,padding:"2px 7px",border:"1px solid "+(previewAs?GOLD+"88":BORDER),borderRadius:3,background:previewAs?GOLD+"22":"transparent",color:previewAs?GOLD:"#9a8a68",cursor:"pointer"}}>👁</button>
            {showPreviewSel&&ReactDOM.createPortal(<div style={{position:"fixed",top:50,right:8,background:BG2,border:"1px solid "+BORDER,borderRadius:4,zIndex:9999,padding:4,minWidth:180,boxShadow:"0 4px 16px #0007"}}>
              {previewAs&&<button onClick={()=>{setPreviewAs(null);setSel(null);setShowD(false);setShowPreviewSel(false);}} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",background:GOLD+"22",border:"none",borderBottom:"1px solid "+BORDER,color:GOLD,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,borderRadius:"3px 3px 0 0",letterSpacing:".05em",marginBottom:2}}>← VOLVER AL DM</button>}
              {PJS.map(p=><button key={p} onClick={()=>enterPreview(p)} style={{display:"block",width:"100%",textAlign:"left",padding:"6px 10px",background:previewAs===p?GOLD+"18":"transparent",border:"none",color:previewAs===p?GOLD:"#ede3c8",cursor:"pointer",fontFamily:"'Crimson Text',serif",fontSize:14,borderRadius:3,fontWeight:previewAs===p?700:400}} onMouseEnter={e=>e.currentTarget.style.background=BG3} onMouseLeave={e=>e.currentTarget.style.background=previewAs===p?GOLD+"18":"transparent"}>{p}</button>)}
            </div>,document.body)}
          </div>)}
          {onUsersPanel&&<button onClick={onUsersPanel} title="Gestión de usuarios" style={{fontSize:11,padding:"2px 7px",border:"1px solid "+BORDER,borderRadius:3,background:"transparent",color:"#9a8a68",cursor:"pointer"}}>👥</button>}
          <button onClick={doSignOut} title="Cerrar sesión" style={{fontSize:11,padding:"2px 7px",border:"1px solid "+BORDER,borderRadius:3,background:"transparent",color:"#9a8a68",cursor:"pointer"}}>⊘</button>
        </div>
      </div>
      <div style={{display:"flex",gap:1}}>
        {TABS.map(t=><button key={t.id} onClick={()=>chTab(t.id)} style={{background:tab===t.id?BG:"transparent",border:"1px solid "+(tab===t.id?GOLD+"55":"transparent"),borderBottom:tab===t.id?"1px solid "+BG:"none",borderRadius:"3px 3px 0 0",padding:"6px 14px",fontSize:mob?10:12,cursor:"pointer",color:tab===t.id?GOLD:"#8a7a58",fontFamily:"'Cinzel',serif",letterSpacing:".07em",marginBottom:tab===t.id?-1:0,transition:"all .15s"}}>{t.icon} {mob?"":t.label.toUpperCase()}</button>)}
      </div>
      </div>
    </div>
    {tab==="aventino"?<AventinPanel edificis={eds} onUpdate={updE} onNew={newE} sel={sel} onSelect={setSel} isMob={mob} showD={showD} setShowD={setShowD} canSeeDimir={canSeeDimir} isPlayer={effectiveUser.rol==="jugador"} playerName={effectiveUser.personatge} chars={cs} navTarget={aventNavTarget} onNavToChar={navToChar} style={{position:"relative",zIndex:1}}/>
    :<div style={{display:"flex",flex:1,overflow:"hidden",position:"relative",background:BG}}>
      <div style={{width:mob?"100%":item?`${listW}%`:"100%",display:mob&&showD&&item?"none":"flex",flexDirection:"column",transition:"width .0s"}}>
        <div style={{padding:"8px 10px",borderBottom:"1px solid "+BORDER,flexShrink:0,background:BG2}}>
          <div style={{position:"relative",marginBottom:7}}>
            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:GOLD,opacity:.5,pointerEvents:"none"}}>⚜</span>
            <input type="text" placeholder={"Cerca "+(tab==="handouts"?"objectes":"personatges")+"..."} value={q} onChange={e=>{setQ(e.target.value);setSel(null);}} style={{width:"100%",padding:"7px 10px 7px 28px",borderRadius:3,border:"1px solid "+BORDER,background:BG,color:"#ede3c8",WebkitTextFillColor:"#ede3c8",fontFamily:"'Crimson Text',serif",fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}}>
            <button className="rv-filter" onClick={()=>setFilt("all")} style={{background:filt==="all"?GOLD+"22":"transparent",border:"1px solid "+(filt==="all"?GOLD+"88":BORDER),color:filt==="all"?GOLD:"#9a8a68"}}>TODOS</button>
            {tab==="chars"?AG.filter(g=>(canSeeDimir||g!=="Dimir")&&cs.some(c=>(c.tags||[]).includes(g))).map(g=><button key={g} className="rv-filter" onClick={()=>setFilt(g===filt?"all":g)} style={{background:filt===g?GC[g]+"1a":"transparent",border:"1px solid "+(filt===g?GC[g]+"66":GC[g]+"22"),color:filt===g?GC[g]:"#9a8a68"}}>{GS[g]} {g}</button>)
            :[...PJS,"Compartido",...(effectiveUser.rol==="dm"?["Solo DM"]:[])] .map(p=><button key={p} className="rv-filter" onClick={()=>setFilt(p===filt?"all":p)} style={{background:filt===p?(PC[p]||"#888")+"1a":"transparent",border:"1px solid "+(filt===p?(PC[p]||"#888")+"66":(PC[p]||"#888")+"22"),color:filt===p?PC[p]||"#888":"#9a8a68"}}>{p}</button>)}

          </div>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {fltd.length===0&&<div style={{padding:30,color:"#9a8a68",fontSize:15,textAlign:"center",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>Cap registre als arxius...</div>}
          {fltd.map((x,i)=>{const vt=tab==="chars"?secureT(x.tags,x.nom):undefined,c=mc(x,tab,vt),isSel=!mob&&sel===i,sig=tab==="chars"&&vt&&vt[0]?GS[vt[0]]:"📜";const cnx=tab==="chars"&&x.visible&&x.visible!=="Tots"&&x.visible!==""?x.visible.split(",")[0].trim()+(x.visible.includes(",")?"…":""):null;
            return(<div key={i} onClick={()=>pick(i)} className="rv-row" style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid "+BORDER,background:isSel?BG3:"transparent",borderLeft:isSel?"2px solid "+c:"2px solid transparent",display:"flex",alignItems:"center",gap:10,transition:"background .1s"}}>

                <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                  {tab==="chars"?secureT(x.tags,x.nom).map(t=><span key={t} style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:GC[t]+"20",color:GC[t],fontFamily:"'Cinzel',serif",letterSpacing:".03em"}}>{GS[t]} {t}</span>):x.propietari&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:(PC[x.propietari]||"#888")+"20",color:PC[x.propietari]||"#888",fontFamily:"'Cinzel',serif",letterSpacing:".03em"}}>{x.propietari}</span>}
                  {cnx&&effectiveUser.rol==="dm"&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:BG3,color:"#9a8a68",fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>👁 {cnx}</span>}
                </div>
              </div>
              <span style={{color:isSel?c:BORDER,fontSize:14,flexShrink:0}}>›</span>
            </div>);
          })}
        </div>
        <div style={{padding:"8px 10px",borderTop:"1px solid "+BORDER,background:BG2,flexShrink:0}}>
          <button onClick={tab==="handouts"?newH:newC} style={{width:"100%",padding:"6px",fontSize:11,border:"1px dashed "+GOLD+"44",borderRadius:3,background:"transparent",color:"#9a8a68",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:".08em"}}>+ NOU {tab==="handouts"?"OBJECTE":"PERSONATGE"}</button>
        </div>
      </div>
      {item&&!mob&&<div onMouseDown={startListDrag} style={{width:5,flexShrink:0,cursor:'col-resize',background:BORDER,zIndex:2,transition:'background .15s'}} onMouseEnter={e=>e.currentTarget.style.background=GOLD+'66'} onMouseLeave={e=>e.currentTarget.style.background=BORDER}/>}
      {item&&(mob?showD?Detail:null:<div style={{flex:1,overflow:"hidden",position:"relative",display:"flex"}}>{Detail}</div>)}
    </div>}
  </div>);
}

function Root(){
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [showUsers,setShowUsers]=useState(false);

  useEffect(()=>{
    initFirebase(FB_CONFIG).then(ok=>{
      if(!ok){setReady(true);return;}
      const unsub=auth.onAuthStateChanged(async fbUser=>{
        if(fbUser){
          const profile=await ensureUserProfile(fbUser.uid,fbUser.email);
          setUser({uid:fbUser.uid,email:fbUser.email,...profile});
        }else{
          setUser(null);
        }
        setReady(true);
      });
      return unsub;
    });
  },[]);

  const Loading=<div style={{height:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:28}}>⚜</div><div style={{fontFamily:"'Cinzel',serif",color:GOLD,fontSize:12,letterSpacing:".08em"}} className="syncing">Cargando...</div></div>;
  if(!ready)return Loading;
  if(!user)return <LoginScreen/>;
  if(!user.rol)return <PendingScreen email={user.email}/>;
  return(<>
    {showUsers&&<UserMgmt onClose={()=>setShowUsers(false)}/>}
    <App user={user} onUsersPanel={user.rol==="dm"?()=>setShowUsers(true):null}/>
  </>);
}
ReactDOM.render(<Root/>,document.getElementById('root'));
</script>
</body>
</html>
