<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arxiu de Ravnica v2.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0f0e0c; }
.rv { font-family: 'Crimson Text', Georgia, serif; background: #0f0e0c; color: #e0d4b8; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
.rv-head { font-family: 'Cinzel', serif; }
.rv-row:hover { background: #1c1a16 !important; }
.rv-btn-gold { background: #a07830; color: #0f0e0c; border: none; cursor: pointer; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.08em; padding: 5px 14px; border-radius: 3px; transition: filter 0.15s; }
.rv-btn-gold:hover { filter: brightness(1.3); }
.rv-editable { cursor: text; padding: 4px 8px; border-radius: 3px; border: 1px solid transparent; transition: border-color 0.15s; }
.rv-editable:hover { border-color: #2a2520; background: #161410; }
.rv-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-family: 'Cinzel', serif; letter-spacing: 0.04em; cursor: pointer; }
.rv-filter { font-size: 10px; padding: 2px 8px; border-radius: 10px; cursor: pointer; font-family: 'Cinzel', serif; letter-spacing: 0.04em; border: 1px solid transparent; transition: all 0.1s; background: transparent; }
.rv-pill { display:inline-flex; align-items:center; gap:3px; font-size:10px; padding:2px 6px; border-radius:10px; font-family:'Cinzel',serif; letter-spacing:0.03em; }
.rv-pill-x { background:none; border:none; cursor:pointer; color:inherit; font-size:11px; line-height:1; padding:0 0 0 2px; opacity:0.6; }
.rv-pill-x:hover { opacity:1; }
.rv-dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#1c1a16; border:1px solid #3a3020; border-radius:4px; z-index:100; padding:4px; box-shadow:0 4px 16px rgba(0,0,0,0.5); }
.rv-check-row { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:3px; cursor:pointer; font-size:13px; font-family:'Crimson Text',Georgia,serif; color:#d4c8a8; transition:background 0.1s; }
.rv-check-row:hover { background:#2a2520; }
.rv-check-row input[type=checkbox] { appearance:none; -webkit-appearance:none; width:14px; height:14px; border:1px solid #5a4a30; border-radius:2px; background:#0f0e0c; cursor:pointer; flex-shrink:0; position:relative; }
.rv-check-row input[type=checkbox]:checked { background:#a07830; border-color:#a07830; }
.rv-check-row input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:-1px; left:2px; font-size:11px; color:#0f0e0c; }
.rv input, .rv textarea, .rv select { -webkit-appearance:none !important; appearance:none !important; background-color:#0f0e0c !important; background:#0f0e0c !important; color:#e0d4b8 !important; -webkit-text-fill-color:#e0d4b8 !important; border-radius:3px !important; opacity:1 !important; font-family:'Crimson Text',Georgia,serif !important; font-size:15px !important; }
.rv input::placeholder, .rv textarea::placeholder { color:#5a5040 !important; -webkit-text-fill-color:#5a5040 !important; opacity:1 !important; }
.rv input[type=checkbox] { width:14px !important; height:14px !important; font-size:unset !important; }
.setup-input { width:100%; padding:8px 12px; border-radius:4px; border:1px solid #3a3020; background:#161410; color:#e0d4b8; font-family:'Crimson Text',serif; font-size:14px; outline:none; margin-bottom:8px; }
.setup-input:focus { border-color:#a0783066; }
::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#a0783040; border-radius:2px; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.rv-detail { animation: fadeUp 0.16s ease; }
.syncing { animation: pulse 1.5s infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

const HANDOUTS = [
  {"nom":"Notas de Laboratorio","propietari":"Manjatan","visible":"Manjatan","contingut":"Fajo desordenado de notas de laboratorio encontradas en la Cámara de Crecimiento Simic. Están principalmente redactadas en Vedalken y Tritón, aunque contiene notas en caracteres extraños escritos apresuradamente de forma enajenada y caótica que no reconoces. Su contenido revela que recientes acontecimientos han permitido realizar grandes avances en el campo de la gestión, control y regeneración de tejidos exánimes mediante la infusión de mana azul en metales no disponibles hasta la fecha. Tras aplicar Comprensión idiomática: los caracteres extraños siguen sin ser reconocibles, pero parece que el metal azul tiene propiedades nigromanticas."},
  {"nom":"Informe para el Juez de Manjatan","propietari":"Compartit","visible":"Ezzio Salvatore, Manjatan, Marchena","contingut":"Fajo desordenado de notas de laboratorio encontradas en la Cámara de Crecimiento Simic. Están principalmente redactadas en Vedalken y Tritón. Su contenido revela que recientes acontecimientos han permitido realizar grandes avances en el campo de la gestión, control y regeneración de tejidos exánimes."},
  {"nom":"Espada de la Venganza","propietari":"Wundyr Somo","visible":"Wundyr Somo","contingut":"Espada, poco común (requiere vinculación). Extraída de un esqueleto con cabeza animal. Obtienes +1 a tiradas de ataque y daño. Maldición: poseída por un espíritu vengativo. Mientras maldito, no puedes desprenderte de ella y tienes desventaja atacando con otras armas. CD 15 SAB cada vez que recibes daño en combate o debes atacar al agresor hasta que uno llegue a 0 PG. Conjurar Destierro sobre la espada libera al espíritu."},
  {"nom":"Gema de Resplandor","propietari":"Compartit","visible":"Tots","contingut":"Objeto maravilloso, Poco común. 50 cargas. 1ª palabra: luz brillante 30 pies (sin cargas). 2ª palabra: haz de luz, CD 15 CON o cegado 1 min (1 carga). 3ª palabra: destello en cono 30 pies (5 cargas). Al agotar las cargas, se convierte en joya no mágica de 50 gp."},
  {"nom":"Escudo Centinela","propietari":"Wundyr Somo","visible":"Wundyr Somo","contingut":"Armadura (escudo), poco común. Mientras estás equipado, tienes ventaja en las pruebas de iniciativa y percepción (Sabiduría). El escudo está adornado con un símbolo de un ojo."},
  {"nom":"Amuleto contra Detección y Localización","propietari":"Ezzio Salvatore","visible":"Ezzio Salvatore","contingut":"Objeto maravilloso, poco común (requiere vinculación). Protección ante la adivinación mágica. No puedes ser blanco de tal magia o percibido a través de métodos de escudriñamiento mágico."},
  {"nom":"Aparato de Mizzium","propietari":"Només DM","visible":"Només DM","contingut":"Objeto maravilloso, Poco común (requiere vinculación). Arnés de mizzium que actúa como foco arcano. Permite intentar lanzar hechizos no preparados de tu lista. Haz Inteligencia (Arcana) CD = 10 + 2× nivel del espacio. Con éxito, lanzas normalmente. Con fallo, lanzas un hechizo aleatorio de esa categoría."},
  {"nom":"Sombrero de disfraz","propietari":"Svikull Rusl","visible":"Svikull Rusl","contingut":"Objeto maravilloso, Poco común (requiere vinculación). Una acción para lanzar Alterar el propio aspecto a voluntad (solo modo Cambio de apariencia). El conjuro finaliza si te quitas el sombrero."},
  {"nom":"Perla de Poder","propietari":"Manjatan","visible":"Manjatan","contingut":"Objeto maravilloso, poco común (requiere vinculación con lanzador). Una acción: recupera un espacio de conjuro gastado de hasta nivel 3. Una vez utilizada, no puede usarse de nuevo hasta el próximo amanecer."},
  {"nom":"Cota de mallas Adamantina","propietari":"Marchena","visible":"Marchena","contingut":"Cota de mallas, Poco común. Reforzada con adamantina. Mientras la uses, cualquier golpe crítico contra ti se convierte en un golpe normal."},
  {"nom":"Baraja de Ilusiones","propietari":"Kasz","visible":"Kasz","contingut":"Objeto maravilloso, Poco común. 34 cartas de pergamino. Una acción: roba carta al azar y lánzala al suelo (30 pies). Aparece una criatura ilusoria real en apariencia pero sin daño. Cualquier interacción física la revela. INT (Investigación) CD 15 la hace translúcida."},
  {"nom":"Pergamino Mágico - Nube de Dagas","propietari":"Kasz","visible":"Kasz","contingut":"Nivel 2, conjuración. Lanzamiento: 1 acción. Alcance: 60 pies. Duración: Concentración hasta 1 minuto. Llenas el aire de dagas giratorias en un cubo de 5 pies creado en un punto a tu elección."},
  {"nom":"Guantelete de Fuerza de Ogro","propietari":"Yarog (HorseLuis)","visible":"Tots","contingut":"Objeto maravilloso, Poco común (requiere vinculación). Tu característica de Fuerza es 19 mientras lleves puestos estos guanteletes. No tienen efecto si tu Fuerza ya es 19 o más."},
  {"nom":"Par de Pistolas Ballesta Crueles","propietari":"Compartit","visible":"Tots","contingut":"2x Pistola Ballesta, raro. Cuando obtienes un 20 en tu tirada de ataque con esta arma mágica, el objetivo recibe 7 puntos de daño extra del mismo tipo."},
  {"nom":"Bolsa de Contención","propietari":"Compartit","visible":"Tots","contingut":"Objeto maravilloso, poco común. Capacidad: 500 lb / 64 pies cúbicos. Pesa 15 lb independientemente del contenido. Sacar un objeto requiere acción. Si se rompe, el contenido va al plano astral."},
  {"nom":"Deposito común en el Santísimo Banco Sindical Orzhov","propietari":"Compartit","visible":"Tots","contingut":"8650 cp (A) · 22950 cp (O) · 262 ep (A) · 557 gp (B).\nObjetos: Cáliz de cobre con filigrana de plata (25 gp) · 2x relicarios de oro con retrato pintado (25 gp) · Set de dados de hueso grabados (25 gp) · Pequeño espejo con marco de madera pintada (25 gp)."},
  {"nom":"3x Poción de Heroísmo (+3)","propietari":"Compartit","visible":"Tots","contingut":"Duración: 1 minuto. La criatura es inmune a ser asustada y gana PG temporales iguales al modificador de lanzamiento al inicio de cada uno de sus turnos."},
  {"nom":"Correo Misterioso","propietari":"Compartit","visible":"Ezzio Salvatore, Wundyr Somo","contingut":"\"He estado ausente durante muchas lunas, hubo contratiempos inesperados. Explica qué es lo que necesitas.\" — Firmado: Un aliado discreto.\n\n[12/XII/21] Necesito: (1) Un hermano goblin desaparecido en la Calle de Hojalata. (2) Cierto goblin ocasionando malestar entre gremios. (3) Grukurg fue engañado — se habla de \"el fantasma\". (4) Quiero saber del pasado de Pesha.\n\n[13/XII/21] Investigaré a Arkady, Pesha y el Goblin. El fantasma: poderoso y misterioso.\n\n[28/II/2022] No busques al goblin. Busca a su familia, retenida por miembros de mi orden o colaboradores de Tajic.\n\n[03/III/2022] Pronto el viento susurrará alguna otra pista."},
  {"nom":"Bandera Trofeo del Basilisco","propietari":"Compartit","visible":"Tots","contingut":"+1 a las tiradas de Persuasión."},
  {"nom":"Goblin Moñeco","propietari":"Compartit","visible":"Tots","contingut":"Objeto maravilloso, poco común. El espíritu de Kasz trascendió su cuerpo tras una desafortunada noche. Su cuerpo semi-momificado es adorado por sus seguidores. Proporciona ventaja en tiradas de Carisma si el Gremio del objetivo comparte al menos un color de maná con el del usuario, o desventaja si no comparte ninguno."}
];

const CHARS = [{"nom":"Ezzio Salvatore","bio":"Ezzio se crió en el orfanato Orzov, aprendió de jovencito a esconderse. Una vez adulto decidió pagar su deuda a la orden sirviendo para el gremio. Nunca le había gustado el hedonismo y la falsa moral de muchos miembros de la orden, sin embargo aún creía en la doctrina: \"sólo necesitan un buen guía\".","info":"Albert Camus contrata alarma · Cresh manda pastelitos a los gruul · Mimic en la bóveda · Cresh manda papeles iluminati","tags":["Orzhov","Dimir"],"controlledby":"Ezzio Salvatore","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127400758/HzQtetqtxICcl1lpMjIxjw/med.jpg?1587843436"},{"nom":"Wundyr Somo","bio":"Mi palabra es mi espada, mis hermanos son mi gremio y mi guia es mi señora Aurelia. Mediador hasta que observo algun acto malvado. Temperamental cuando no atienden a razones. Impartiré justicia vaya donde vaya.","info":"","tags":["Boros"],"controlledby":"Wundyr Somo","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127323363/4pCQ0r1OWaIiNq60_kyuKg/med.jpg?1587835305"},{"nom":"Yarog (HorseLuis)","bio":"","info":"","tags":["Gruul"],"controlledby":"Yarog (HorseLuis)","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127754962/l6mBha6VE1edth5mw9YpAg/med.jpg?1587908669"},{"nom":"Manjatan","bio":"","info":"","tags":["Izzet"],"controlledby":"Manjatan","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127416851/29ndmC1QD3EWKuQuLWAlYA/med.jpg?1587845240"},{"nom":"Svikull Rusl","bio":"","info":"","tags":["Golgari","Dimir"],"controlledby":"Svikull Rusl","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/130785035/aM3cA0uhwDhc1bi5oPwyQg/med.jpg?1588537393"},{"nom":"Marchena","bio":"","info":"","tags":["Azorius"],"controlledby":"Marchena","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127690102/zUh54sl1TxUiU5Y1-lGPJw/med.jpg?1587894532"},{"nom":"Kasz","bio":"","info":"","tags":["Rakdos"],"controlledby":"Kasz","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/127730251/LM6MK7XbCogQpcelULyLFw/med.jpg?1587903797"},{"nom":"El Vocero","bio":"El Vocero és un Homúnculo creat per magos Azorius per dur a terme tasques senzilles. Gritón i malhumerós, està lligat màgicament a l'Oficina Capella de la plaça principal del Aventino.","info":"Homunculus · Tiny construct, neutral · AC 13 · HP 5 (2d4) · Speed 20ft/fly 40ft · Telepathic Bond.","tags":["Azorius"],"controlledby":"DM","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/134387587/69HvF5kPgZ2G_5NayjWJPg/med.jpg?1589459431"},{"nom":"Pesha la Tabernera","bio":"Pesha es la propietaria de El Cuerno de Oro, una minotaura con muy malas pulgas. Llegó al barrio con su tatuaje Rakdos en el brazo, algo de dinero y actitud a raudales, decidida a llevar su propia taberna y a no hablar de un pasado misterioso.","info":"Minotaur · Large monstrosity, chaotic evil · AC 14 · HP 76 · STR 18(+4) · Charge, Labyrinthine Recall, Reckless.","tags":["Rakdos"],"controlledby":"DM","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/134908404/Bg0IuZ-7onyngUboYnx1DQ/med.jpg?1589583065"},{"nom":"Kotyali la Cazadora","bio":"Kotyali combina la apariencia salvaje de una cazadora centaura con el porte de una urbanita. Abierta y directa, su amable tono siempre encuentra el camino al corazón de quienes la escuchan.","info":"Centaur · Large monstrosity, neutral good · AC 12 · HP 45 · STR 18(+4) · Charge, Multiattack.","tags":["Guildless"],"controlledby":"DM","visible":"Ezzio Salvatore, Wundyr Somo, Yarog (HorseLuis), Svikull Rusl","avatar":"https://s3.amazonaws.com/files.d20.io/images/134925985/sAuOOF0z6gtT8L5spF0T8g/med.jpg?1589585826"},{"nom":"Shazel Bara, Chaman del clan","bio":"","info":"","tags":["Gruul"],"controlledby":"DM","visible":"Yarog (HorseLuis)","avatar":"https://s3.amazonaws.com/files.d20.io/images/159940191/bTqcBv26Ul8YCeClO4MaBw/med.jpg?1598303847"},{"nom":"Obez el Prestamista","bio":"No hay mucho que contar de Obez, pues ha elevado a la categoría de arte la mediocridad. Gordo y perezoso, lo único que le mantiene en el Sindicato son sus deudas. Su única fuente de placer es hundir en la desdicha a aquellos a los que ve felices.","info":"Cultist · Medium humanoid, non-good · AC 12 · HP 9 · Dark Devotion: ventaja contra ser encantado o asustado.","tags":["Orzhov"],"controlledby":"DM","visible":"Ezzio Salvatore, Svikull Rusl","avatar":"https://s3.amazonaws.com/files.d20.io/images/134952811/aZUvC5sukZM9fjZCMj_irA/med.jpg?1589589768"},{"nom":"Iván el Cocinero","bio":"Puede que la cocina de la taberna no sea exquisita, pero les proporciona un momento de tranquilidad. Sus gruesos dedos agarrando cuchillos y sus ojos perturbadoramente abiertos de par en par no deben inquietaros: Iván es (casi) siempre un buen muchacho.","info":"Berserker · Medium humanoid, chaotic · AC 13 · HP 67 · STR 16(+3) CON 17(+3) · Reckless.","tags":["Guildless"],"controlledby":"DM","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/134953943/_FcJ2mPXNKCjs6UEP2ZEuQ/med.jpg?1589589992"},{"nom":"Grukurg el Tintador","bio":"Este ogro se pasa el día curtiendo pieles en su taller, y su actitud oscila entre el trabajo obsesivo y la furia psicótica, dependiendo de los gases de las cubas y los errores de sus empleados.","info":"Ogre · Large giant, chaotic evil · AC 11 · HP 59 · STR 19(+4) · Darkvision 60ft.","tags":["Guildless"],"controlledby":"DM","visible":"Ezzio Salvatore, Wundyr Somo, Svikull Rusl, Marchena, Manjatan","avatar":"https://s3.amazonaws.com/files.d20.io/images/135064372/J9vdKUYw41Wt5XUf8F59Mw/med.jpg?1589622122"},{"nom":"Ten el Pescadero","bio":"","info":"Currante, familiar, ha patit durant la crisi de l'aigua. On pesca??","tags":["Guildless"],"controlledby":"DM","visible":"Svikull Rusl, Marchena","avatar":"https://s3.amazonaws.com/files.d20.io/images/135066150/J5O_8n9-efZgG6i8e05Mlw/med.jpg?1589622763"},{"nom":"Morai la Capataz","bio":"Vivir sin la protección de un gremio en Ravnica no es fácil, pero a Morai le compensa: es su propia jefa (Obras Aventino SA). Algo reservada, pero en sus proyectos despliega un amplio abanico de conocimientos técnicos.","info":"CounterFlux Blastseeker · AC 13 · HP 39 · Counterflux Overcast (Recarga 5-6) · Hechizos: enlarge/reduce, scorching ray, counterspell. Putejada per Obez.","tags":["Guildless"],"controlledby":"DM","visible":"Ezzio Salvatore, Svikull Rusl, Wundyr Somo","avatar":"https://s3.amazonaws.com/files.d20.io/images/137136197/gTg-urlSCeaqyYEogMK8fA/med.jpg?1590173195"},{"nom":"Cresh el Vendedor de Comida Ambulante","bio":"Descrito como el empresario menos exitoso de Ravnica. Ha vendido desde un extraño líquido verde hasta auténticas reliquias sagradas. Ostenta a la vez los cargos de Presidente, Portavoz, Notario y Portero del gremio de Vendedores de Comida ambulante.","info":"Lizardfolk · AC 15 · HP 22 · CHA 15(+2) · Hold Breath 15 min · Persuasión+4, Insight+5.","tags":["Guildless"],"controlledby":"DM","visible":"Tots","avatar":"https://s3.amazonaws.com/files.d20.io/images/135068396/2YUbzAjPuH4t1tti5t0NnA/med.jpg?1589623501"},{"nom":"Elon Tusk el Mercader de grano","bio":"Si en el mercado escuchas maldiciones y ruido de cosas rompiéndose, te has encontrado a Elon. Ser un loxodon no evita ser descuidado ni torpe, aunque eso le ha permitido tener la plaza más espaciosa del mercado.","info":"Druid · AC 14 · HP 27 · WIS 16(+3) · Keen Smell: ventaja en Percepción, Supervivencia e Investigación por olfato.","tags":["Guildless"],"controlledby":"DM","visible":"Ezzio Salvatore, Wundyr Somo, Svikull Rusl, Marchena, Yarog (HorseLuis)","avatar":"https://s3.amazonaws.com/files.d20.io/images/135309178/qOA4xzoRTA77kVQxvDS7TA/med.jpg?1589665772"},{"nom":"Dhalya Macav la Comerciante","bio":"Toda una vida de aventuras comerciales le ha proporcionado una extensa red de contactos. Si necesitas cualquier cosa, ella puede conseguirlo. Es una negociadora brutal y nunca pierde la oportunidad de sacar tajada.","info":"Noble · AC 15 · HP 9 · CHA 16(+3) · Engaño+5, Perspicacia+4, Persuasión+5.","tags":["Guildless"],"controlledby":"DM","visible":"Svikull Rusl, Wundyr Somo","avatar":"https://s3.amazonaws.com/files.d20.io/images/136803555/vMU2EdrxXWy0mvAH8Ea2lg/med.jpg?1590082836"},{"nom":"Maeve la Carterista","bio":"Vivir en un mundo hecho a medida de gigantes no ha hecho más que facilitarle la vida a esta hada y a su banda de carteristas. La vida puede ser muy fácil cuando robar tu peso en oro no es solamente una expresión.","info":"Sprite · Tiny fey, neutral good · AC 15 · HP 2 · DEX 18(+4) · Stealth+8 · Heart Sight · Invisibilidad a voluntad.","tags":["Guildless"],"controlledby":"DM","visible":"Svikull Rusl","avatar":"https://s3.amazonaws.com/files.d20.io/images/137111466/1sTJYdiJeg5PNBB3Sb7DMg/med.jpg?1590168678"},{"nom":"Sila, Tribuno de la Legión","bio":"Uno de los más notables políticos y militares Boros en el último siglo. Tras distinguirse en las revueltas obreras Gruul y el asedio de la Senda Verde, los intentos de arrebatarle el control a Tajic le llevaron a la vida política. La Guerra de la Chispa reavivó su fuego justiciero.","info":"","tags":["Boros"],"controlledby":"DM","visible":"Wundyr Somo","avatar":"https://s3.amazonaws.com/files.d20.io/images/140846489/JZKrNO2P1TWnFITERAxa2g/med.jpg?1591302625"},{"nom":"Aurelio, Líder del Clan","bio":"","info":"","tags":["Gruul"],"controlledby":"DM","visible":"Ezzio Salvatore, Wundyr Somo, Yarog (HorseLuis)","avatar":"https://s3.amazonaws.com/files.d20.io/images/140847160/TyZ2lWlSB6gg3N-S-0jzjQ/med.jpg?1591302781"},{"nom":"Arkady el Alborotador","bio":"Arkady no ha tenido una vida fácil. Entró en la Escuela Eclesiástica Orzhov, donde destacó en pintura, teatro y poesía, pero perdió el interés en los estudios sacerdotales. Asistía a reuniones obreras secretas y asambleas Gruul. Finalmente abandonó el seminario para unirse a una tribu errante Gruul.","info":"","tags":["Gruul"],"controlle // ── FIREBASE ──────────────────────────────────────────
let db = null;

async function initFirebase(cfg) {
  // Dynamically load Firebase SDK
  if (!window.firebase) {
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js");
    await loadScript("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js");
  }
  try {
    const app = window.firebase.apps.length
      ? window.firebase.app()
      : window.firebase.initializeApp(cfg);
    db = window.firebase.firestore(app);
    // Test connection
    await db.collection("ravnica").doc("handouts").get();
    return true;
  } catch(e) {
    console.error("Firebase error:", e);
    db = null;
    return false;
  }
}

function loadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function fbSave(hs, cs) {
  if (!db) return false;
  try {
    await db.collection("ravnica").doc("handouts").set({ data: JSON.stringify(hs) });
    await db.collection("ravnica").doc("chars").set({ data: JSON.stringify(cs) });
    return true;
  } catch(e) { return false; }
}

async function fbLoad() {
  if (!db) return null;
  try {
    const [rh, rc] = await Promise.all([
      db.collection("ravnica").doc("handouts").get(),
      db.collection("ravnica").doc("chars").get()
    ]);
    return {
      hs: rh.exists ? JSON.parse(rh.data().data) : null,
      cs: rc.exists ? JSON.parse(rc.data().data) : null,
    };
  } catch(e) { return null; }
}

function visToArr(v){if(!v||v==="Tots")return["Tots"];return v.split(",").map(s=>s.trim()).filter(Boolean);}
function arrToVis(arr){if(!arr||arr.length===0)return"Tots";if(arr.includes("Tots"))return"Tots";return arr.join(", ");}
function mc(item,tab){return tab==="handouts"?PC[item.propietari]||"#8a7a5a":item.tags&&item.tags.length?GC[item.tags[0]]||"#8a7a5a":"#8a7a5a";}
function initials(n){return(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");}

function SetupScreen({onConnect}) {

  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const fields = [
    {k:"apiKey", label:"API Key"},
    {k:"authDomain", label:"Auth Domain"},
    {k:"projectId", label:"Project ID"},
    {k:"storageBucket", label:"Storage Bucket"},
    {k:"messagingSenderId", label:"Messaging Sender ID"},
    {k:"appId", label:"App ID"},
  ];

  const handlePaste = (e) => {
    const text = e.clipboardData.getData("text");
    // Try to parse pasted Firebase config object
    const match = text.match(/apiKey:\s*["'](.*?)["'].*?authDomain:\s*["'](.*?)["'].*?projectId:\s*["'](.*?)["'].*?storageBucket:\s*["'](.*?)["'].*?messagingSenderId:\s*["'](.*?)["'].*?appId:\s*["'](.*?)["']/s);
    if (match) {
      const parsed = {apiKey:match[1],authDomain:match[2],projectId:match[3],storageBucket:match[4],messagingSenderId:match[5],appId:match[6]};
      setCfg(parsed);
      e.preventDefault();
    }
  };

  const connect = async () => {
    if (!cfg.apiKey || !cfg.projectId) { setError("Cal omplir com a mínim API Key i Project ID"); return; }
    setLoading(true); setError("");
    const ok = await initFirebase(cfg);
    if (ok) {
      localStorage.setItem("rv_fbcfg", JSON.stringify(cfg));
      onConnect();
    } else {
      setError("Error de connexió. Comprova les credencials i que Firestore estigui activat al projecte.");
    }
    setLoading(false);
  };

  const skipLocal = () => { db = null; onConnect(); };

  return (

          <div style={{fontSize:14,color:"#8a7a60",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>
            Configura Firebase per sincronitzar entre dispositius

        {/* Instruccions */}
        <div style={{background:BG2,border:`1px solid ${BORDER}`,borderRadius:4,padding:"12px 14px",marginBottom:16,fontSize:13,color:"#9a8a70",lineHeight:1.7,fontFamily:"'Crimson Text',serif"}}>
          <strong style={{color:"#c8b880",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:"0.06em"}}>COM CONFIGURAR (5 min)</strong><br/>
          1. Ves a <a href="https://console.firebase.google.com" target="_blank" style={{color:GOLD}}>console.firebase.google.com</a><br/>
          2. Crea un projecte nou (gratuït)<br/>
          3. Activa <strong style={{color:"#c8b880"}}>Firestore Database</strong> en mode test<br/>
          4. Ves a Configuració del projecte → Afegeix una app web<br/>
          5. Copia el codi de configuració i enganxa'l al camp de sota
        </div>

        {/* Paste area */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:GOLD,fontFamily:"'Cinzel',serif",letterSpacing:"0.08em",marginBottom:6}}>
            ENGANXA LA CONFIGURACIÓ FIREBASE (o omple manualment):
          </div>
          <textarea
            className="setup-input"
            style={{minHeight:60,resize:"vertical"}}
            placeholder={"// Enganxa aquí el teu firebaseConfig:
const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  ..."}
            onPaste={handlePaste}
            readOnly
          />
        </div>

        {/* Manual fields */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          {fields.map(({k,label})=>(
            <div key={k}>
              <div style={{fontSize:9,color:"#6a5a40",fontFamily:"'Cinzel',serif",letterSpacing:"0.06em",marginBottom:3}}>{label.toUpperCase()}</div>
              <input className="setup-input" style={{marginBottom:0}} value={cfg[k]||""} onChange={e=>setCfg(p=>({...p,[k]:e.target.value}))} placeholder={label}/>
            </div>
          ))}
        </div>

        {error && <div style={{color:"#c43030",fontSize:12,marginBottom:10,fontFamily:"'Crimson Text',serif",padding:"6px 10px",background:"#c4303015",borderRadius:3,border:"1px solid #c4303033"}}>{error}</div>}

        <div style={{display:"flex",gap:8}}>
          <button className="rv-btn-gold" onClick={connect} disabled={loading}
            style={{flex:1,padding:"10px",fontSize:12,opacity:loading?0.7:1}}>
            {loading ? "CONNECTANT..." : "⚡ CONNECTAR AMB FIREBASE"}
          </button>
          <button onClick={skipLocal}
            style={{padding:"10px 14px",fontSize:11,background:"transparent",color:"#6a5a40",
              border:`1px solid ${BORDER}`,borderRadius:3,cursor:"pointer",
              fontFamily:"'Cinzel',serif",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>
            Usar local
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"#4a3a28",fontFamily:"'Crimson Text',serif"}}>
          "Usar local" guarda les dades només en aquest navegador
        </div>
      </div>
    </div>
  );
}

// ── COMPONENTS ──────────────────────────────────────
function VisibleSelect({value,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  const sel=visToArr(value);
  const isTots=sel.includes("Tots");
  useEffect(()=>{
    if(!open)return;
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);}};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[open]);
  const toggle=(pj)=>{
    if(pj==="Tots"){onChange("Tots");return;}
    let next=isTots?[]:[...sel];
    if(next.includes(pj))next=next.filter(x=>x!==pj);else next.push(pj);
    if(next.length===0)next=["Tots"];
    onChange(arrToVis(next));
  };
  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={()=>setOpen(!open)} style={{display:"flex",flexWrap:"wrap",gap:4,padding:"4px 8px",cursor:"pointer",
        border:`1px solid ${open?GOLD+"66":BORDER}`,borderRadius:3,background:"#0f0e0c",minHeight:28,alignItems:"center"}}>
        {isTots?<span style={{fontSize:12,color:"#5a9a3a",fontFamily:"'Cinzel',serif",letterSpacing:"0.04em"}}>✦ Tots</span>
          :sel.map(p=><span key={p} className="rv-pill" style={{background:(PC[p]||"#888")+"18",border:`1px solid ${PC[p]||"#888"}44`,color:PC[p]||"#888"}}>{p}</span>)}
        <span style={{marginLeft:"auto",color:GOLD,opacity:0.4,fontSize:10}}>▾</span>
      </div>
      {open&&(
        <div className="rv-dropdown">
          <label className="rv-check-row">
            <input type="checkbox" checked={isTots} onChange={()=>toggle("Tots")}/>
            <span style={{color:"#5a9a3a",fontFamily:"'Cinzel',serif",fontSize:11}}>✦ Tots</span>
          </label>
          {PJS.map(p=>(
            <label key={p} className="rv-check-row">
              <input type="checkbox" checked={!isTots&&sel.includes(p)} onChange={()=>toggle(p)} disabled={isTots}/>
              <span style={{color:isTots?"#4a4030":PC[p]||"#888",fontFamily:"'Cinzel',serif",fontSize:11}}>{p}</span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

function Field({value,onChange,multi=false,accent,ph="Editar..."}){
  const [ed,setEd]=useState(false);
  const [draft,setDraft]=useState(value);
  const ref=useRef(null);
  useEffect(()=>setDraft(value),[value]);
  useEffect(()=>{
    if(!ed)return;
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target)){onChange(draft);setEd(false);}};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[ed,draft,onChange]);
  const commit=()=>{onChange(draft);setEd(false);};
  const s={width:"100%",padding:"5px 8px",borderRadius:3,border:`1px solid ${GOLD}55`,background:"#0f0e0c",color:"#e0d4b8",WebkitTextFillColor:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",fontSize:15,outline:"none",lineHeight:1.75,opacity:1};
  if(!ed)return(
    <div className="rv-editable" onClick={()=>setEd(true)} style={{position:"relative",minHeight:24}}>
      <span style={{position:"absolute",top:4,right:6,fontSize:10,color:GOLD,opacity:0.4,pointerEvents:"none"}}>✎</span>
      {value?<p style={{margin:0,fontSize:15,lineHeight:1.75,color:"#e0d4b8",whiteSpace:"pre-line",paddingRight:14}}>{value}</p>
            :<p style={{margin:0,fontSize:14,color:"#5a5040",fontStyle:"italic"}}>{ph}</p>}
    </div>
  );
  return(
    <div ref={ref}>
      {multi?<textarea autoFocus value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Escape")commit();}} style={{...s,minHeight:90,resize:"vertical",display:"block"}}/>
        :<input autoFocus type="text" value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")commit();}} style={s}/>}
    </div>
  );
}

function GuildTagSel({value,opts,onChange,onRemove,cm}){
  const [ed,setEd]=useState(false);
  const col=cm&&cm[value]||"#8a7a5a";
  if(!ed)return(
    <span style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:11,padding:"2px 4px 2px 8px",borderRadius:10,background:col+"18",border:`1px solid ${col}44`,color:col,fontFamily:"'Cinzel',serif",letterSpacing:"0.04em"}}>
      <span onClick={()=>setEd(true)} style={{cursor:"pointer"}}>{value}</span>
      <button onClick={(e)=>{e.stopPropagation();onRemove();}} className="rv-pill-x" style={{color:col}}>×</button>
    </span>
  );
  return(
    <select autoFocus value={value} onChange={e=>{onChange(e.target.value);setEd(false);}} onBlur={()=>setEd(false)}
      style={{fontSize:12,padding:"3px 8px",borderRadius:3,border:`1px solid ${GOLD}55`,background:"#0f0e0c",color:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",cursor:"pointer",WebkitTextFillColor:"#e0d4b8"}}>
      {opts.map(o=><option key={o} value={o} style={{background:"#0f0e0c",color:"#e0d4b8"}}>{o}</option>)}
    </select>
  );
}

function Sel({value,opts,onChange,cm}){
  const [ed,setEd]=useState(false);
  const col=cm&&cm[value]||"#8a7a5a";
  if(!ed)return(<span className="rv-tag" onClick={()=>setEd(true)} style={{background:col+"18",border:`1px solid ${col}44`,color:col}}>{value} ✎</span>);
  return(
    <select autoFocus value={value} onChange={e=>{onChange(e.target.value);setEd(false);}} onBlur={()=>setEd(false)}
      style={{fontSize:14,padding:"3px 8px",borderRadius:3,border:`1px solid ${GOLD}55`,background:"#0f0e0c",color:"#e0d4b8",fontFamily:"'Crimson Text',Georgia,serif",cursor:"pointer",WebkitTextFillColor:"#e0d4b8"}}>
      {opts.map(o=><option key={o} value={o} style={{background:"#0f0e0c",color:"#e0d4b8"}}>{o}</option>)}
    </select>
  );
}

function Rule({color}){
  const c=color||GOLD;
  return(<div style={{display:"flex",alignItems:"center",gap:8,margin:"10px 0"}}>
    <div style={{flex:1,height:"1px",background:`linear-gradient(to right,transparent,${c}40)`}}/>
    <span style={{fontSize:10,color:c,opacity:0.5}}>✦</span>
    <div style={{flex:1,height:"1px",background:`linear-gradient(to left,transparent,${c}40)`}}/>
  </div>);
}

// ── MAIN APP ──────────────────────────────────────────
function App(){
  const [ready,setReady]=useState(false);
  const [tab,setTab]=useState("chars");
  const [q,setQ]=useState("");
  const [filt,setFilt]=useState("all");
  const [sel,setSel]=useState(null);
  const [showD,setShowD]=useState(false);
  const [hs,setHs]=useState(HANDOUTS);
  const [cs,setCs]=useState(CHARS);
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | saving | saved | error
  const [mob,setMob]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    const chk=()=>setMob(window.innerWidth<580);
    chk();window.addEventListener("resize",chk);return()=>window.removeEventListener("resize",chk);
  },[]);

  // Check if Firebase already configured
  useEffect(()=>{
    const saved=localStorage.getItem("rv_fbcfg");
    if(saved){
      initFirebase(JSON.parse(saved)).then(ok=>{
        if(!ok) db=null;
        onConnected();
      });
    }
  },[]);

  const onConnected=async()=>{
    // Load data
    if(db){
      const data=await fbLoad();
      if(data){
        if(data.hs) setHs(data.hs);
        if(data.cs) setCs(data.cs);
      }
    } else {
      const lh=localStorage.getItem("rv_h4"),lc=localStorage.getItem("rv_c4");
      if(lh) setHs(JSON.parse(lh));
      if(lc) setCs(JSON.parse(lc));
    }
    setReady(true);
  };

  const save=useCallback((nh,nc)=>{
    const finalH=nh||hs, finalC=nc||cs;
    setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      if(db){
        const ok=await fbSave(finalH,finalC);
        setSyncStatus(ok?"saved":"error");
      } else {
        localStorage.setItem("rv_h4",JSON.stringify(finalH));
        localStorage.setItem("rv_c4",JSON.stringify(finalC));
        setSyncStatus("saved");
      }
      setTimeout(()=>setSyncStatus("idle"),2500);
    },600);
  },[hs,cs]);

  const newH=()=>{const h=[...hs,{nom:"Nou handout",propietari:"Compartit",visible:"Tots",contingut:"",notes_dm:""}];setHs(h);save(h,null);setTab("handouts");setQ("");setFilt("all");setSel(h.length-1);setShowD(true);};
  const newC=()=>{const c=[...cs,{nom:"Nou personatge",bio:"",info:"",tags:["Guildless"],controlledby:"DM",visible:"Tots"}];setCs(c);save(null,c);setTab("chars");setQ("");setFilt("all");setSel(c.length-1);setShowD(true);};
  const del=()=>{
    if(!item)return;
    if(!window.confirm(`Eliminar "${item.nom}"?`))return;
    if(tab==="handouts"){const h=hs.filter((_,i)=>i!==origI);setHs(h);save(h,null);}
    else{const c=cs.filter((_,i)=>i!==origI);setCs(c);save(null,c);}
    setSel(null);setShowD(false);
  };
  const updH=(i,f,v)=>{const h=hs.map((x,j)=>j===i?{...x,[f]:v}:x);setHs(h);save(h,null);};
  const updC=(i,f,v)=>{const c=cs.map((x,j)=>j===i?{...x,[f]:v}:x);setCs(c);save(null,c);};

  const disconnectFb=()=>{localStorage.removeItem("rv_fbcfg");db=null;window.location.reload();};

  const items=tab==="handouts"?hs:cs;
  const fltd=useMemo(()=>{
    const lq=q.toLowerCase();
    return items.filter(x=>{
      const ms=!lq||x.nom.toLowerCase().includes(lq)||(x.contingut||"").toLowerCase().includes(lq)||(x.bio||"").toLowerCase().includes(lq)||(x.info||"").toLowerCase().includes(lq);
      const mf=tab==="chars"?filt==="all"||(x.tags||[]).includes(filt):filt==="all"||x.propietari===filt;
      return ms&&mf;
    });
  },[items,q,filt,tab]);

  const getOI=fi=>tab==="handouts"?hs.findIndex(x=>x===fi):cs.findIndex(x=>x===fi);
  const item=sel!==null&&sel<fltd.length?fltd[sel]:null;
  const origI=item?getOI(item):-1;
  const ac=item?mc(item,tab):GOLD;
  const isPJ=item&&PJS.includes(item.nom);

  function chTab(t){setTab(t);setQ("");setFilt("all");setSel(null);setShowD(false);}
  function pick(i){setSel(i===sel&&!mob?null:i);setShowD(true);}

  const syncLabel = db
    ? (syncStatus==="saving"?"☁ sincronitzant...":syncStatus==="saved"?"✦ sincronitzat":syncStatus==="error"?"⚠ error sync":"☁ Firebase")
    : (syncStatus==="saving"?"⏳ desant...":syncStatus==="saved"?"✦ desat":syncStatus==="error"?"⚠ error":"⬡ local");

  const syncColor = syncStatus==="error"?"#c43030":syncStatus==="saved"?GOLD:db?"#5a9a3a":"#8a7a5a";

  if(!ready) return(
    <div style={{height:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:8}}>⚜</div>
        <div style={{fontFamily:"'Cinzel',serif",color:GOLD,letterSpacing:"0.06em",fontSize:12}} className="syncing">CARREGANT L'ARXIU...</div>
      </div>
    </div>
  );

  const Detail=item?(
    <div className="rv-detail" style={{flex:1,overflowY:"auto",padding:"16px 18px",position:"relative",
      ...(mob?{position:"absolute",top:0,left:0,right:0,bottom:0,background:BG,zIndex:10}:{})}}>
      {mob&&<button onClick={()=>setShowD(false)} style={{marginBottom:14,background:"none",border:"none",cursor:"pointer",color:GOLD,fontSize:14,padding:0,fontFamily:"'Cinzel',serif",letterSpacing:"0.06em"}}>← TORNAR</button>}
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
        <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,background:`radial-gradient(circle at 30% 30%,${ac}28,${ac}0a)`,border:`1px solid ${ac}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:tab==="handouts"?17:13,color:ac,fontFamily:"'Cinzel',serif"}}>
          {tab==="handouts"?"📜":initials(item.nom)}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{marginBottom:6}}><Field value={item.nom} onChange={v=>tab==="handouts"?updH(origI,"nom",v):updC(origI,"nom",v)} accent={ac}/></div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",paddingLeft:8}}>
            {tab==="chars"?(
              <>
                {(item.tags||[]).map((t,ti)=>(
                  <GuildTagSel key={ti} value={t} opts={AG} cm={GC}
                    onChange={v=>{const nt=[...(item.tags||[])];nt[ti]=v;updC(origI,"tags",nt);}}
                    onRemove={()=>{const nt=(item.tags||[]).filter((_,j)=>j!==ti);updC(origI,"tags",nt.length?nt:["Guildless"]);}}/>
                ))}
                <button onClick={()=>updC(origI,"tags",[...(item.tags||[]),"Guildless"])} style={{fontSize:10,padding:"2px 7px",borderRadius:10,border:`1px dashed ${GOLD}44`,background:"transparent",color:GOLD,cursor:"pointer",fontFamily:"'Cinzel',serif",opacity:0.6}}>+ gremi</button>
              </>
            ):(
              <Sel value={item.propietari} opts={[...PJS,"Compartit","Només DM"]} onChange={v=>updH(origI,"propietari",v)} cm={PC}/>
            )}
            {isPJ&&<span className="rv-tag" style={{background:ac+"18",border:`1px solid ${ac}44`,color:ac,cursor:"default"}}>PJ</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          <button onClick={del} style={{background:"none",border:`1px solid #c4303033`,borderRadius:3,cursor:"pointer",color:"#c43030",fontSize:14,padding:"3px 7px"}}>🗑</button>
          {!mob&&<button onClick={()=>{setSel(null);setShowD(false);}} style={{background:"none",border:"none",cursor:"pointer",color:"#9a8a70",fontSize:20,padding:"0 2px",lineHeight:1}}>×</button>}
        </div>
      </div>
      {tab==="chars"&&(
        <>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingLeft:4,marginBottom:6}}>
            <div style={{fontSize:13,padding:"3px 10px",borderRadius:12,background:BG2,border:`1px solid ${BORDER}`,display:"flex",gap:5,alignItems:"center"}}>
              <span style={{opacity:0.5}}>🎮</span>
              <span style={{color:"#9a8a70",fontFamily:"'Cinzel',serif",fontSize:10,letterSpacing:"0.06em"}}>CONTROL</span>
              <span style={{color:"#e0d4b8",fontFamily:"'Crimson Text',serif"}}>{item.controlledby}</span>
            </div>
          </div>
          <div style={{paddingLeft:4,marginBottom:6}}>
            <div style={{fontSize:10,color:"#9a8a70",fontFamily:"'Cinzel',serif",letterSpacing:"0.1em",marginBottom:5}}>CONEIX A:</div>
            <VisibleSelect value={item.visible||"Tots"} onChange={v=>updC(origI,"visible",v)}/>
          </div>
        </>
      )}
      <Rule color={ac}/>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:10,color:ac,fontFamily:"'Cinzel',serif",letterSpacing:"0.12em",marginBottom:4,paddingLeft:8,opacity:0.8}}>{tab==="handouts"?"CONTINGUT":"BIO & INFO"}</div>
        <Field value={item.bio||item.contingut||""} onChange={v=>tab==="handouts"?updH(origI,"contingut",v):updC(origI,"bio",v)} multi={true} accent={ac} ph="Afegir contingut..."/>
      </div>
      <Rule/>
      <div>
        <div style={{fontSize:10,color:"#9a8a70",fontFamily:"'Cinzel',serif",letterSpacing:"0.12em",marginBottom:4,paddingLeft:8}}>NOTES DEL DM</div>
        <Field value={item.info||item.notes_dm||""} onChange={v=>tab==="handouts"?updH(origI,"notes_dm",v):updC(origI,"info",v)} multi={true} accent={GOLD} ph="Notes privades..."/>
      </div>
    </div>
  ):null;

  return(
    <div className="rv" style={{border:`1px solid ${BORDER}`,borderRadius:6,overflow:"hidden"}}>
      <div style={{background:BG2,borderBottom:`1px solid ${BORDER}`,padding:"12px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <div style={{width:22,height:22,borderRadius:"50%",border:`1px solid ${GOLD}55`,background:`${GOLD}0f`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:12,lineHeight:1}}>⚜</span>
          </div>
          <div>
            <span className="rv-head" style={{fontSize:mob?13:15,color:"#f0e4b0",letterSpacing:"0.07em",fontWeight:600}}>Arxiu de Ravnica</span>
            {!mob&&<span style={{fontSize:13,color:"#8a7a60",fontStyle:"italic",fontFamily:"'Crimson Text',serif",marginLeft:10}}>v2.2</span>}
          </div>
          <span className={syncStatus==="saving"?"syncing":""} style={{fontSize:10,color:syncColor,marginLeft:4,fontFamily:"'Cinzel',serif",letterSpacing:"0.05em",transition:"color 0.3s"}}>{syncLabel}</span>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            {!mob&&<button onClick={disconnectFb} title="Canviar connexió" style={{fontSize:9,background:"transparent",border:"none",color:"#3a3020",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:"0.04em"}}>⚙</button>}
            {!mob&&<span style={{fontSize:12,color:"#8a7a60",fontFamily:"'Cinzel',serif"}}>{hs.length}H · {cs.length}P</span>}
            <button className="rv-btn-gold" onClick={tab==="handouts"?newH:newC}>+ {tab==="handouts"?"HANDOUT":"PERSONATGE"}</button>
          </div>
        </div>
        <div style={{display:"flex",gap:1}}>
          {[{id:"chars",icon:"👤",label:"Personatges"},{id:"handouts",icon:"📜",label:"Handouts"}].map(t=>(
            <button key={t.id} onClick={()=>chTab(t.id)} style={{background:tab===t.id?BG:"transparent",border:`1px solid ${tab===t.id?GOLD+"44":"transparent"}`,borderBottom:tab===t.id?`1px solid ${BG}`:"none",borderRadius:"3px 3px 0 0",padding:"6px 16px",fontSize:12,cursor:"pointer",color:tab===t.id?GOLD:"#6a5a40",fontFamily:"'Cinzel',serif",letterSpacing:"0.07em",marginBottom:tab===t.id?-1:0,transition:"all 0.15s"}}>
              {t.icon} {t.label.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative",background:BG}}>
        <div style={{width:mob?"100%":item?"36%":"100%",display:mob&&showD&&item?"none":"flex",flexDirection:"column",borderRight:!mob&&item?`1px solid ${BORDER}`:"none",transition:"width 0.2s"}}>
          <div style={{padding:"8px 10px",borderBottom:`1px solid ${BORDER}`,flexShrink:0,background:BG2}}>
            <div style={{position:"relative",marginBottom:7}}>
              <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:13,color:GOLD,opacity:0.5,pointerEvents:"none"}}>⚜</span>
              <input type="text" placeholder={`Cerca ${tab==="handouts"?"handouts":"personatges"}...`} value={q} onChange={e=>{setQ(e.target.value);setSel(null);}}
                style={{width:"100%",padding:"7px 10px 7px 28px",borderRadius:3,border:`1px solid ${BORDER}`,background:"#0f0e0c",color:"#e0d4b8",WebkitTextFillColor:"#e0d4b8",fontFamily:"'Crimson Text',serif",fontSize:14,outline:"none"}}/>
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              <button className="rv-filter" onClick={()=>setFilt("all")} style={{background:filt==="all"?GOLD+"22":"transparent",border:`1px solid ${filt==="all"?GOLD+"55":BORDER}`,color:filt==="all"?GOLD:"#7a6a50"}}>TOTS</button>
              {tab==="chars"?AG.filter(g=>cs.some(c=>(c.tags||[]).includes(g))).map(g=>(
                <button key={g} className="rv-filter" onClick={()=>setFilt(g===filt?"all":g)} style={{background:filt===g?GC[g]+"1a":"transparent",border:`1px solid ${filt===g?GC[g]+"55":GC[g]+"22"}`,color:filt===g?GC[g]:"#7a6a50"}}>{GS[g]} {g}</button>
              )):[...PJS,"Compartit","Només DM"].map(p=>(
                <button key={p} className="rv-filter" onClick={()=>setFilt(p===filt?"all":p)} style={{background:filt===p?(PC[p]||"#888")+"1a":"transparent",border:`1px solid ${filt===p?(PC[p]||"#888")+"55":(PC[p]||"#888")+"22"}`,color:filt===p?PC[p]||"#888":"#7a6a50"}}>{p}</button>
              ))}
            </div>
          </div>
          <div style={{overflowY:"auto",flex:1}}>
            {fltd.length===0&&<div style={{padding:30,color:"#8a7a60",fontSize:15,textAlign:"center",fontStyle:"italic",fontFamily:"'Crimson Text',serif"}}>Cap registre als arxius...</div>}
            {fltd.map((x,i)=>{
              const c=mc(x,tab),isSel=!mob&&sel===i;
              const sig=tab==="chars"&&x.tags&&x.tags[0]?GS[x.tags[0]]:"📜";
              const coneixSummary=tab==="chars"&&x.visible&&x.visible!=="Tots"?x.visible.split(",")[0].trim()+(x.visible.includes(",")?"…":""):null;
              return(
                <div key={i} onClick={()=>pick(i)} className="rv-row" style={{padding:"9px 14px",cursor:"pointer",borderBottom:`1px solid ${BORDER}`,background:isSel?BG3:"transparent",borderLeft:isSel?`2px solid ${c}`:`2px solid transparent`,display:"flex",alignItems:"center",gap:10,transition:"background 0.1s"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:`${c}14`,border:`1px solid ${c}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:c}}>{sig}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,color:isSel?"#f0e4b0":"#d4c8a8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Cinzel',serif",letterSpacing:"0.03em",fontWeight:isSel?600:400}}>
                      {x.nom}
                      {PJS.includes(x.nom)&&<span style={{marginLeft:5,fontSize:9,background:c+"1a",color:c,borderRadius:2,padding:"1px 4px",fontFamily:"'Cinzel',serif",verticalAlign:"middle"}}>PJ</span>}
                    </div>
                    <div style={{display:"flex",gap:3,marginTop:3,flexWrap:"wrap"}}>
                      {tab==="chars"?(x.tags||[]).map(t=>(<span key={t} style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:GC[t]+"15",color:GC[t],fontFamily:"'Cinzel',serif",letterSpacing:"0.03em"}}>{GS[t]} {t}</span>)):x.propietari&&(<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:(PC[x.propietari]||"#888")+"15",color:PC[x.propietari]||"#888",fontFamily:"'Cinzel',serif",letterSpacing:"0.03em"}}>{x.propietari}</span>)}
                      {coneixSummary&&<span style={{fontSize:10,padding:"1px 5px",borderRadius:8,background:BG3,color:"#8a7a60",fontFamily:"'Crimson Text',serif",fontStyle:"italic"}}>👁 {coneixSummary}</span>}
                    </div>
                  </div>
                  <span style={{color:isSel?c:BORDER,fontSize:14,flexShrink:0}}>›</span>
                </div>
              );
            })}
          </div>
          <div style={{padding:"8px 10px",borderTop:`1px solid ${BORDER}`,background:BG2,flexShrink:0}}>
            <button onClick={tab==="handouts"?newH:newC} style={{width:"100%",padding:"6px",fontSize:11,border:`1px dashed ${GOLD}35`,borderRadius:3,background:"transparent",color:"#7a6a50",cursor:"pointer",fontFamily:"'Cinzel',serif",letterSpacing:"0.08em"}}>+ NOU {tab==="handouts"?"HANDOUT":"PERSONATGE"}</button>
          </div>
        </div>
        {item&&(mob?(showD?Detail:null):<div style={{flex:1,overflowY:"auto",position:"relative"}}>{Detail}</div>)}
      </div>
    </div>
  );
}

function Root(){
  const [connected,setConnected]=useState(false);
  // Check if already configured
  const hasCfg=!!localStorage.getItem("rv_fbcfg");
  if(!connected&&!hasCfg) return <SetupScreen onConnect={()=>setConnected(true)}/>;
  return <App/>;
}

ReactDOM.render(<Root/>, document.getElementById('root'));
</script>
</body>
</html>
